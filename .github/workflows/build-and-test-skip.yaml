# This workflow provides passing "build" status checks for docs-only PRs.
#
# The main "Build and test HolmesGPT" workflow uses path filters to skip
# docs-only changes, but branch protection requires the "build (3.10/3.11/3.12)"
# checks. When the main workflow is skipped, GitHub never reports a status,
# blocking the merge. This workflow runs on the inverse path filter and
# reports the same job names so the required checks pass.
name: Build and test HolmesGPT (skip)

on:
  pull_request:
    paths:
      - 'docs/**'
      - '**/*.md'
      - 'mkdocs.yml'
      - '!docs/reference/http-api.md'

jobs:
  build:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ubuntu-latest

    steps:
      - name: Skip build for docs-only changes
        run: echo "Build skipped — docs-only change"
