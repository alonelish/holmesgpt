name: 'Setup HolmesGPT Environment'
description: 'Install Python, Poetry, kubectl and HolmesGPT dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  install-kubectl:
    description: 'Whether to install kubectl'
    required: false
    default: 'true'
  working-directory:
    description: 'Working directory for poetry commands (where pyproject.toml is located)'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    # asdf-vm/actions/install finds the .tool-versions from current directory or parent directories,
    # but code is checked out in a subdirectory, so we need to copy it to the current directory to
    # make sure asdf installs tools successfully.
    - name: Copy asdf configuration file
      shell: bash
      run: |
        cp code/.tool-versions .
    - name: Install Poetry
      uses: asdf-vm/actions/install@v4

    - name: Configure Poetry and install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Configure Poetry to not create virtualenvs (we use system Python in CI)
        poetry config virtualenvs.create false
        python -m pip install --upgrade pip setuptools pyinstaller
        poetry install --no-root --with dev

    - name: Install kubectl
      if: inputs.install-kubectl == 'true'
      shell: bash
      run: |
        # Using hardcoded version to avoid failures when dl.k8s.io/release/stable.txt is unreachable
        KUBECTL_VERSION="v1.35.0"
        curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        kubectl version --client
