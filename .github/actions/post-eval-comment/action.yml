name: Post Eval Comment
description: 'Posts or updates eval progress/results comment (SECURITY: always loads helpers from main branch)'

inputs:
  mode:
    description: 'Comment mode: initial, progress-setup, progress-collect, progress-kind, results'
    required: true
  params:
    description: 'JSON string of eval parameters (base_params from workflow)'
    required: true
  comment-id:
    description: 'Existing comment ID for updates'
    required: false
    default: ''
  duration:
    description: 'Test duration for results mode'
    required: false
    default: ''
  test-count:
    description: 'Number of tests for progress modes'
    required: false
    default: ''
  test-preview:
    description: 'Test preview list for progress modes'
    required: false
    default: ''
  valid-markers:
    description: 'Valid pytest markers comma-separated'
    required: false
    default: ''
  triggered-by:
    description: 'Username who triggered eval'
    required: false
    default: ''

outputs:
  comment-id:
    description: 'Created/updated comment ID'
    value: ${{ steps.post-comment.outputs.comment_id }}
  is-persistent:
    description: 'Whether this is a persistent comment (true) or ephemeral (false)'
    value: ${{ steps.post-comment.outputs.is_persistent }}

runs:
  using: composite
  steps:
    - name: Post or update comment
      id: post-comment
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          // SECURITY CRITICAL: Load helpers from action directory
          // Action directory is ALWAYS from the workflow's ref (main branch),
          // never from PR code, preventing malicious code execution
          const {
            AUTO_EVAL_COMMENT_IDENTIFIER,
            buildParams,
            buildBody,
            buildRerunFooter,
            parseRunHistory,
            extractCurrentRun,
            buildAutoCommentWithHistory
          } = require('${{ github.action_path }}/eval-comment-helpers.js');

          // Parse all inputs into params object
          const rawParams = JSON.parse(${{ toJSON(inputs.params) }});
          const p = buildParams({
            ...rawParams,
            comment_id: ${{ toJSON(inputs.comment-id) }},
            duration: ${{ toJSON(inputs.duration) }},
            test_count: ${{ toJSON(inputs.test-count) }},
            test_preview: ${{ toJSON(inputs.test-preview) }},
            valid_markers: ${{ toJSON(inputs.valid-markers) }},
            triggered_by: ${{ toJSON(inputs.triggered-by) }}
          });

          const mode = ${{ toJSON(inputs.mode) }};

          // === INITIAL COMMENT MODE ===
          if (mode === 'initial') {
            const progressSteps = [
              [false, 'Setup HolmesGPT environment'],
              [false, 'Collect evals to run'],
              [false, 'Setup KIND cluster'],
              [false, 'Run evals']
            ];

            // For automated runs (not /eval or workflow_dispatch), use persistent comment
            if (!p.isManual) {
              // Find existing persistent comment
              let existingComment = null;
              let page = 1;
              while (true) {
                const response = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: p.prNumber,
                  per_page: 100,
                  page: page
                });
                const found = response.data.find(c => c.body.includes(AUTO_EVAL_COMMENT_IDENTIFIER));
                if (found) {
                  existingComment = found;
                  break;
                }
                if (response.data.length < 100) break;
                page++;
              }

              const currentContent = buildBody(p, progressSteps, { context });
              const footer = buildRerunFooter(p, context);

              if (existingComment) {
                // Parse history from existing comment, including moving current run to history
                const previousRuns = parseRunHistory(existingComment.body);
                const currentRun = extractCurrentRun(existingComment.body);
                if (currentRun && currentRun.content) {
                  previousRuns.unshift(currentRun);
                }
                const body = buildAutoCommentWithHistory(currentContent, previousRuns, footer);
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: body
                });
                core.setOutput('comment_id', existingComment.id.toString());
                core.setOutput('is_persistent', 'true');
              } else {
                // Create new persistent comment
                const body = buildAutoCommentWithHistory(currentContent, [], footer);
                const comment = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: p.prNumber,
                  body: body
                });
                core.setOutput('comment_id', comment.data.id.toString());
                core.setOutput('is_persistent', 'true');
              }
            } else {
              // Manual runs: create a fresh comment (original behavior)
              const comment = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: p.prNumber,
                body: buildBody(p, progressSteps, { context }) + buildRerunFooter(p, context)
              });
              core.setOutput('comment_id', comment.data.id.toString());
              core.setOutput('is_persistent', 'false');
            }
            return;
          }

          // === PROGRESS UPDATE MODES ===
          if (mode.startsWith('progress-')) {
            let progressSteps;
            let extras = { context };

            if (mode === 'progress-setup') {
              progressSteps = [
                [true, 'Setup HolmesGPT environment'],
                [false, 'Collect evals to run'],
                [false, 'Setup KIND cluster'],
                [false, 'Run evals']
              ];
            } else if (mode === 'progress-collect') {
              progressSteps = [
                [true, 'Setup HolmesGPT environment'],
                [true, `Collect evals to run (${p.testCount} tests)`],
                [false, 'Setup KIND cluster'],
                [false, 'Run evals']
              ];
              extras.testPreview = p.testCount !== '0' ? p.testPreview : null;
            } else if (mode === 'progress-kind') {
              progressSteps = [
                [true, 'Setup HolmesGPT environment'],
                [true, `Collect evals to run (${p.testCount} tests)`],
                [true, 'Setup KIND cluster'],
                [false, 'Run evals']
              ];
              extras.testPreview = p.testCount !== '0' ? p.testPreview : null;
            }

            // Determine if this is a persistent comment by checking if we have the output from initial
            // Since we can't access previous step outputs directly, we check the comment body
            const existingComment = await github.rest.issues.getComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: p.commentId
            });
            const isPersistent = existingComment.data.body.includes(AUTO_EVAL_COMMENT_IDENTIFIER);

            let body;
            if (isPersistent) {
              // Preserve history for automated runs
              const previousRuns = parseRunHistory(existingComment.data.body);
              const currentContent = buildBody(p, progressSteps, extras);
              const footer = buildRerunFooter(p, context);
              body = buildAutoCommentWithHistory(currentContent, previousRuns, footer);
            } else {
              body = buildBody(p, progressSteps, extras) + buildRerunFooter(p, context);
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: p.commentId,
              body: body
            });
            return;
          }

          // === RESULTS MODE ===
          if (mode === 'results') {
            // Read test result files (these are generated by pytest, not from PR checkout)
            const report = fs.existsSync('evals_report.md') ? fs.readFileSync('evals_report.md', 'utf8') : '';
            const failures = fs.existsSync('regressions.txt') ? fs.readFileSync('regressions.txt', 'utf8').trim() : '';
            const hasFailures = failures && failures !== '0';

            // Build notification header for the user who triggered the eval (only for manual runs)
            const triggeredBy = p.triggered_by || '';
            const statusText = hasFailures
              ? `⚠️ Completed with ${failures} failure${failures === '1' ? '' : 's'}`
              : '✅ Completed successfully';
            const notifyHeader = triggeredBy ? `@${triggeredBy} Your eval run has finished. ${statusText}\n\n---\n\n` : '';

            // Build current run content
            let currentContent = buildBody(p, null, {
              icon: p.isManual ? '🧪' : '✅',
              title: p.isManual ? 'Manual Eval Results' : 'Results of HolmesGPT evals',
              context
            });
            currentContent += '\n' + (report || '⚠️ No eval report was generated.\n\n');
            if (hasFailures) currentContent += `\n### ⚠️ ${failures} Failure${failures === '1' ? '' : 's'} Detected\n\n`;
            const footer = buildRerunFooter(p, context, { includeLegend: true });

            // Check if persistent by looking at existing comment (if we have one)
            let isPersistent = false;
            if (p.commentId) {
              const existingComment = await github.rest.issues.getComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: p.commentId
              });
              isPersistent = existingComment.data.body.includes(AUTO_EVAL_COMMENT_IDENTIFIER);
            }

            if (isPersistent && p.commentId) {
              // For automated runs: update the persistent comment, preserving history
              const existingComment = await github.rest.issues.getComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: p.commentId
              });
              const previousRuns = parseRunHistory(existingComment.data.body);
              const body = buildAutoCommentWithHistory(currentContent, previousRuns, footer);
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: p.commentId,
                body: body
              });
            } else {
              // For manual runs: delete progress comment and create fresh results comment
              // This ensures the user gets a GitHub notification when evals complete
              const body = notifyHeader + currentContent + footer;
              if (p.commentId) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: p.commentId
                });
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: p.prNumber, body
              });
            }
            return;
          }
