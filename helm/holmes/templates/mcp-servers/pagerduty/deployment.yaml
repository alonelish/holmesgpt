{{- if .Values.mcpAddons.pagerduty.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-pagerduty-mcp-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-pagerduty-mcp
    app.kubernetes.io/name: pagerduty-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
data: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pagerduty-mcp-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-pagerduty-mcp
    app.kubernetes.io/name: pagerduty-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-pagerduty-mcp
      app.kubernetes.io/name: pagerduty-mcp-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-pagerduty-mcp
        app.kubernetes.io/name: pagerduty-mcp-server
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: holmes
      annotations:
        checksum/config: {{ .Values.mcpAddons.pagerduty | toYaml | sha256sum }}
    spec:
      {{- if .Values.mcpAddons.pagerduty.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.mcpAddons.pagerduty.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.mcpAddons.pagerduty.tolerations }}
      tolerations:
        {{- toYaml .Values.mcpAddons.pagerduty.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.mcpAddons.pagerduty.affinity }}
      affinity:
        {{- toYaml .Values.mcpAddons.pagerduty.affinity | nindent 8 }}
      {{- end }}
      containers:
      - name: pagerduty-mcp
        image: "{{ .Values.mcpAddons.pagerduty.registry }}/{{ .Values.mcpAddons.pagerduty.image }}"
        imagePullPolicy: {{ .Values.mcpAddons.pagerduty.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PAGERDUTY_USER_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ required "mcpAddons.pagerduty.auth.secretName is required" .Values.mcpAddons.pagerduty.auth.secretName }}
              key: {{ .Values.mcpAddons.pagerduty.auth.secretKey | default "token" }}
        {{- if .Values.mcpAddons.pagerduty.config.apiHost }}
        - name: PAGERDUTY_API_HOST
          value: {{ .Values.mcpAddons.pagerduty.config.apiHost | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.mcpAddons.pagerduty.resources | nindent 10 }}
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pagerduty-mcp-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-pagerduty-mcp
    app.kubernetes.io/name: pagerduty-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
spec:
  selector:
    app: {{ .Release.Name }}-pagerduty-mcp
    app.kubernetes.io/name: pagerduty-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
{{- end }}
