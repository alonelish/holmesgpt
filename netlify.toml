[build]
  # Only install mkdocs dependencies, not the full project
  # Use python -m mkdocs since pip installs to ~/.local/bin which may not be in PATH
  # Pin mkdocs-material version to match poetry.lock for consistent icon rendering
  command = "pip install 'mkdocs-material==9.6.18' mkdocs-glightbox mkdocs-awesome-nav && python -m mkdocs build"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

# Handle SPA-style navigation for defined paths
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Context-specific settings for deploy previews
[context.deploy-preview]
  command = "pip install 'mkdocs-material==9.6.18' mkdocs-glightbox mkdocs-awesome-nav && python -m mkdocs build"

[context.branch-deploy]
  command = "pip install 'mkdocs-material==9.6.18' mkdocs-glightbox mkdocs-awesome-nav && python -m mkdocs build"
