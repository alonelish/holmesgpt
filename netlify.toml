# Netlify configuration for HolmesGPT documentation

[build]
  command = "pip install mkdocs-material mkdocs-glightbox mkdocs-awesome-nav && mkdocs build"
  publish = "site"

# Only build if docs-related files have changed
# The ignore command should return:
#   0 (success) = skip the build (no docs changes)
#   1 (failure) = proceed with the build (docs changed)
#
# Paths checked for changes:
#   - docs/       (documentation content)
#   - mkdocs.yml  (MkDocs configuration)
[build.ignore]
  command = "bash -c 'if [ -z \"$CACHED_COMMIT_REF\" ]; then exit 1; fi; git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- docs/ mkdocs.yml'"
