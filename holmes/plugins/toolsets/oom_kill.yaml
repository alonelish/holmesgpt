toolsets:
  oom_kill/bash:
    description: "DANGEROUS: intentionally allocate ~30GB on the Holmes host to trigger OOM kill for stress testing."
    docs_url: ""
    icon_url: ""
    tags:
      - cli
    additional_instructions: |
      ⚠️ This toolset is intentionally destructive. Only use in controlled environments.
    tools:
      - name: "trigger_oom_kill_bash"
        description: "Allocate ~30GB of memory and hold it for a period to provoke the OOM killer."
        command: |
          python - <<'PY'
          import sys
          import time

          confirm = "{{ confirm }}"
          if str(confirm).lower() not in ("true", "yes", "1"):
              sys.exit("Confirmation required: set confirm=true to run the OOM trigger.")

          try:
              hold_seconds = int("{{ hold_seconds|default(300) }}")
          except Exception:
              sys.exit("hold_seconds must be an integer.")

          if hold_seconds <= 0:
              sys.exit("hold_seconds must be positive.")

          size_bytes = 30 * 1024 * 1024 * 1024
          print(f"Allocating {size_bytes / 1024 / 1024 / 1024:.0f} GB of memory to intentionally trigger OOM kill; sleeping for {hold_seconds}s")
          data = bytearray(size_bytes)
          time.sleep(hold_seconds)
          PY
