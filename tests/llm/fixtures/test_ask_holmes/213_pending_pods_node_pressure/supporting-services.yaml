# Supporting infrastructure services — all healthy, just add noise to the namespace
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-cache
  namespace: app-213
  labels:
    app: payment-cache
    tier: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-cache
  template:
    metadata:
      labels:
        app: payment-cache
        tier: infra
    spec:
      containers:
      - name: redis
        image: registry.k8s.io/pause:3.9
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-cache
  namespace: app-213
  labels:
    app: payment-cache
    tier: infra
spec:
  selector:
    app: payment-cache
  ports:
  - port: 6379
    targetPort: 6379
---
