user_prompt:
- "The payment-processor service in namespace app-213 is experiencing very high latency. Customers are complaining about slow checkouts. Investigate what's going on."

expected_output:
  - Must identify that some payment-processor pods are in Pending state and cannot be scheduled
  - Must identify that the reason is insufficient CPU or memory resources on the node(s)
  - Should note that the deployment or HPA wants more replicas than can currently be scheduled, leaving existing pods overloaded

include_tool_calls: true

tags:
  - kubernetes
  - medium
  - chain-of-causation
  - regression

setup_timeout: 180

before_test: |
  set -e

  echo "📁 Creating namespace..."
  kubectl create namespace app-213 --dry-run=client -o yaml | kubectl apply -f -

  echo "🗄️ Deploying supporting services (cache, queue, db)..."
  kubectl apply -f supporting-services.yaml -n app-213

  echo "🚀 Deploying payment-processor with 2 replicas..."
  kubectl apply -f payment-processor.yaml -n app-213

  echo "⏳ Waiting for initial payment-processor pods to be ready..."
  PODS_READY=false
  for i in {1..60}; do
    if kubectl wait --for=condition=ready pod -l app=payment-processor -n app-213 --timeout=5s 2>/dev/null; then
      echo "✅ Initial pods are ready!"
      PODS_READY=true
      break
    fi
    sleep 1
  done
  if [ "$PODS_READY" = false ]; then
    echo "❌ Initial pods failed to become ready"
    kubectl get pods -n app-213
    exit 1
  fi

  echo "⏳ Waiting for supporting service pods..."
  INFRA_READY=false
  for i in {1..60}; do
    if kubectl wait --for=condition=ready pod -l tier=infra -n app-213 --timeout=5s 2>/dev/null; then
      echo "✅ Supporting services are ready!"
      INFRA_READY=true
      break
    fi
    sleep 1
  done
  if [ "$INFRA_READY" = false ]; then
    echo "❌ Supporting services failed to become ready"
    kubectl get pods -n app-213
    exit 1
  fi

  echo "🐛 Deploying noisy error-logging service (red herring)..."
  kubectl apply -f noisy-sidecar.yaml -n app-213

  echo "📊 Applying HPA..."
  kubectl apply -f hpa.yaml -n app-213

  echo "📈 Scaling up to force Pending pods (requesting more CPU than node has)..."
  kubectl scale deployment/payment-processor --replicas=15 -n app-213

  echo "⏳ Waiting for Pending pods to appear..."
  PENDING_FOUND=false
  for i in {1..60}; do
    PENDING_COUNT=$(kubectl get pods -n app-213 -l app=payment-processor --field-selector=status.phase=Pending --no-headers 2>/dev/null | wc -l)
    if [ "$PENDING_COUNT" -gt "0" ]; then
      echo "✅ Found $PENDING_COUNT Pending pods!"
      PENDING_FOUND=true
      break
    fi
    sleep 1
  done
  if [ "$PENDING_FOUND" = false ]; then
    echo "⚠️ No Pending pods found - node may have more resources than expected"
    kubectl get pods -n app-213
  fi

  echo "📋 Final state:"
  kubectl get pods -n app-213
  kubectl get events -n app-213 --sort-by='.lastTimestamp' | tail -15

  echo "✅ Test setup completed"

after_test: |
  kubectl delete namespace app-213 || true
