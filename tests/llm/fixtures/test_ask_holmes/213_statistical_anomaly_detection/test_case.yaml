# Test: Statistical Anomaly Detection via Multi-Dimensional Aggregation
# Tests Holmes's ability to identify failure patterns through ES aggregations
# when surface-level analysis gives misleading results.
#
# Difficulty: HARD
# - 300+ request logs in a single index with 15+ fields
# - Errors correlate with a specific routing_group (the true cause)
# - Red herring #1: /api/v3/export endpoint has elevated error rate (correlation, not cause)
# - Red herring #2: eu-central region has elevated error rate (correlation, not cause)
# - Red herring #3: enterprise tier has elevated error rate (correlation, not cause)
# - Error messages contain misleading hints ("gateway congestion", "payload too large")
# - Must discover the correct dimension to aggregate by among 8+ categorical fields
# - Must cross-reference a second index (backend-config) for the root cause
# - Fundamentally different from temporal/cascade tests: requires STATISTICAL reasoning
#
# Requirements:
# - ELASTICSEARCH_URL: URL to Elasticsearch cluster
# - ELASTICSEARCH_API_KEY: API key for authentication
#
# Anti-hallucination: The config audit ID CFG-AUDIT-m7k2p9x4 is only in the
# backend-config index and can only be found by identifying routing-group-5 as
# the problem, then looking up its configuration.

user_prompt: >
  Our API has been returning intermittent HTTP 500 errors affecting some users.
  The request logs are in 'app-213-request-logs' and backend infrastructure
  configuration is in 'app-213-backend-config'. Analyze the error patterns
  across different dimensions to find what is specifically causing the 500 errors
  and which infrastructure component is at fault.

expected_output:
  - "Must identify routing-group-5 as the backend component with disproportionately high error rate"
  - "Must NOT attribute the root cause primarily to the /api/v3/export endpoint, eu-central region, or enterprise user tier (these are correlations, not causes)"
  - "Must reference the TLS certificate or SSL configuration issue found in app-213-backend-config for routing-group-5"
  - "Must report the config audit ID CFG-AUDIT-m7k2p9x4 from the backend config"

tags:
  - elasticsearch
  - hard
  - regression

setup_timeout: 300

before_test: |
  set -e
  source ../../shared/es_test_utils.sh
  es_setup

  INDICES=(
    "app-213-request-logs"
    "app-213-backend-config"
  )

  # Clean up any existing test indices
  echo "⏳ Cleaning up existing test indices..."
  for idx in "${INDICES[@]}"; do
    curl -sf -X DELETE "${ELASTICSEARCH_URL}/${idx}" \
      -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  done

  # Create request logs index with detailed mapping
  echo "⏳ Creating request logs index..."
  curl -sf -X PUT "${ELASTICSEARCH_URL}/app-213-request-logs?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "settings": {"number_of_shards": 1, "number_of_replicas": 0},
      "mappings": {
        "properties": {
          "@timestamp": {"type": "date"},
          "level": {"type": "keyword"},
          "method": {"type": "keyword"},
          "endpoint": {"type": "keyword"},
          "status_code": {"type": "integer"},
          "latency_ms": {"type": "integer"},
          "routing_group": {"type": "keyword"},
          "client_region": {"type": "keyword"},
          "user_tier": {"type": "keyword"},
          "request_id": {"type": "keyword"},
          "session_id": {"type": "keyword"},
          "request_size_bytes": {"type": "integer"},
          "response_size_bytes": {"type": "integer"},
          "cache_hit": {"type": "boolean"},
          "auth_method": {"type": "keyword"},
          "api_version": {"type": "keyword"},
          "message": {"type": "text", "fields": {"keyword": {"type": "keyword", "ignore_above": 512}}}
        }
      }
    }' > /dev/null

  # Create backend config index
  echo "⏳ Creating backend config index..."
  curl -sf -X PUT "${ELASTICSEARCH_URL}/app-213-backend-config?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "settings": {"number_of_shards": 1, "number_of_replicas": 0},
      "mappings": {
        "properties": {
          "@timestamp": {"type": "date"},
          "routing_group": {"type": "keyword"},
          "upstream_host": {"type": "keyword"},
          "upstream_port": {"type": "integer"},
          "ssl_cert_path": {"type": "keyword"},
          "ssl_verify": {"type": "boolean"},
          "max_connections": {"type": "integer"},
          "health_status": {"type": "keyword"},
          "last_config_change": {"type": "date"},
          "config_audit_id": {"type": "keyword"},
          "notes": {"type": "text"}
        }
      }
    }' > /dev/null

  sleep 2

  # Generate request logs using Python for precise statistical control
  echo "⏳ Generating 300 request log entries..."
  BULK_FILE=$(es_temp_file "bulk" "213-requests")

  python3 << 'PYEOF' > "$BULK_FILE"
  import json, random, hashlib

  random.seed(42)

  routing_groups = [f"routing-group-{i}" for i in range(1, 9)]
  regions = ["us-east", "us-west", "eu-west", "eu-central"]
  tiers = ["free", "pro", "enterprise"]
  endpoints = ["/api/v3/search", "/api/v3/upload", "/api/v3/export", "/api/v3/profile", "/api/v3/dashboard"]
  methods_map = {"/api/v3/search": "GET", "/api/v3/upload": "POST", "/api/v3/export": "POST", "/api/v3/profile": "GET", "/api/v3/dashboard": "GET"}
  auth_methods = ["bearer_token", "api_key", "oauth2"]
  api_versions = ["v3.1", "v3.2", "v3.3"]

  error_messages_generic = [
      "upstream connection reset by peer",
      "upstream TLS handshake failed: certificate verify error",
      "upstream request timeout after 30s",
      "upstream returned unexpected EOF during response body read",
  ]
  error_messages_regional = [
      "upstream connection timeout (regional gateway latency elevated)",
      "upstream response delayed: cross-region hop detected",
  ]
  error_messages_export = [
      "upstream processing error: request payload exceeds buffer allocation",
      "upstream batch operation failed: resource temporarily unavailable",
  ]

  base_ts = 1750000000  # ~2025-06-15T14:06:40Z
  entries = []

  # Generate 260 normal requests (spread across groups 1-4, 6-8, low error rate)
  normal_groups = [g for g in routing_groups if g != "routing-group-5"]
  for i in range(260):
      ts = base_ts + random.randint(0, 3600)
      group = random.choice(normal_groups)
      region = random.choice(regions)
      tier = random.choice(tiers)
      endpoint = random.choice(endpoints)
      method = methods_map[endpoint]
      auth = random.choice(auth_methods)
      api_ver = random.choice(api_versions)
      cache = random.random() < 0.3
      req_size = random.randint(200, 50000) if method == "POST" else random.randint(50, 500)

      # 2% error rate for normal groups
      if random.random() < 0.02:
          status = 500
          latency = random.randint(1000, 5000)
          resp_size = random.randint(100, 300)
          msg = f"{method} {endpoint} 500 {latency}ms - {random.choice(error_messages_generic)}"
          level = "ERROR"
      else:
          status = 200
          latency = random.randint(30, 400)
          resp_size = random.randint(500, 100000)
          msg = f"{method} {endpoint} 200 {latency}ms"
          level = "INFO"

      req_id = f"req-{hashlib.md5(f'{i}-normal'.encode()).hexdigest()[:10]}"
      sess_id = f"sess-{hashlib.md5(f'{i}-s'.encode()).hexdigest()[:8]}"

      entries.append({
          "@timestamp": f"{ts}000",
          "level": level,
          "method": method,
          "endpoint": endpoint,
          "status_code": status,
          "latency_ms": latency,
          "routing_group": group,
          "client_region": region,
          "user_tier": tier,
          "request_id": req_id,
          "session_id": sess_id,
          "request_size_bytes": req_size,
          "response_size_bytes": resp_size,
          "cache_hit": cache,
          "auth_method": auth,
          "api_version": api_ver,
          "message": msg
      })

  # Generate 40 routing-group-5 requests (85% error rate)
  # Designed correlations: 50% eu-central, 40% /api/v3/export, 35% enterprise
  for i in range(40):
      ts = base_ts + random.randint(0, 3600)

      # Biased distributions to create misleading correlations
      region = "eu-central" if random.random() < 0.50 else random.choice(regions)
      endpoint = "/api/v3/export" if random.random() < 0.40 else random.choice(endpoints)
      tier = "enterprise" if random.random() < 0.35 else random.choice(tiers)
      method = methods_map[endpoint]
      auth = random.choice(auth_methods)
      api_ver = random.choice(api_versions)
      cache = random.random() < 0.1  # Lower cache hit for group-5
      req_size = random.randint(200, 50000) if method == "POST" else random.randint(50, 500)

      # 85% error rate
      if random.random() < 0.85:
          status = 500
          latency = random.randint(2000, 30000)
          resp_size = random.randint(100, 300)
          level = "ERROR"
          # Use misleading error messages based on correlated dimensions
          if region == "eu-central" and random.random() < 0.4:
              msg_detail = random.choice(error_messages_regional)
          elif endpoint == "/api/v3/export" and random.random() < 0.4:
              msg_detail = random.choice(error_messages_export)
          else:
              msg_detail = random.choice(error_messages_generic)
          msg = f"{method} {endpoint} 500 {latency}ms - {msg_detail}"
      else:
          status = 200
          latency = random.randint(100, 800)
          resp_size = random.randint(500, 100000)
          msg = f"{method} {endpoint} 200 {latency}ms"
          level = "INFO"

      req_id = f"req-{hashlib.md5(f'{i}-rg5'.encode()).hexdigest()[:10]}"
      sess_id = f"sess-{hashlib.md5(f'{i}-s5'.encode()).hexdigest()[:8]}"

      entries.append({
          "@timestamp": f"{ts}000",
          "level": level,
          "method": method,
          "endpoint": endpoint,
          "status_code": status,
          "latency_ms": latency,
          "routing_group": "routing-group-5",
          "client_region": region,
          "user_tier": tier,
          "request_id": req_id,
          "session_id": sess_id,
          "request_size_bytes": req_size,
          "response_size_bytes": resp_size,
          "cache_hit": cache,
          "auth_method": auth,
          "api_version": api_ver,
          "message": msg
      })

  # Shuffle to mix normal and group-5 entries
  random.shuffle(entries)

  # Write NDJSON bulk format
  for entry in entries:
      print(json.dumps({"index": {"_index": "app-213-request-logs"}}))
      print(json.dumps(entry))
  PYEOF

  # Upload request logs
  BULK_SIZE=$(wc -l < "$BULK_FILE")
  echo "  Generated $((BULK_SIZE / 2)) request log entries"

  curl -sf -X POST "${ELASTICSEARCH_URL}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE" > /dev/null
  rm -f "$BULK_FILE"

  # Generate backend config entries
  echo "⏳ Creating backend configuration data..."
  BULK_FILE=$(es_temp_file "bulk" "213-config")
  cat > "$BULK_FILE" << 'BULK_EOF'
  {"index":{"_index":"app-213-backend-config"}}
  {"@timestamp":"2025-06-14T12:00:00Z","routing_group":"routing-group-1","upstream_host":"db-node-1.internal","upstream_port":5432,"ssl_cert_path":"/etc/certs/db-node-1-2026.pem","ssl_verify":true,"max_connections":100,"health_status":"healthy","last_config_change":"2025-06-01T08:00:00Z","config_audit_id":"CFG-AUDIT-a1b2c3d4","notes":"Standard configuration. Certificate valid until 2026-03-15. Last rotation: 2025-06-01."}
  {"index":{"_index":"app-213-backend-config"}}
  {"@timestamp":"2025-06-14T12:00:00Z","routing_group":"routing-group-2","upstream_host":"db-node-2.internal","upstream_port":5432,"ssl_cert_path":"/etc/certs/db-node-2-2026.pem","ssl_verify":true,"max_connections":100,"health_status":"healthy","last_config_change":"2025-06-01T08:00:00Z","config_audit_id":"CFG-AUDIT-e5f6a7b8","notes":"Standard configuration. Certificate valid until 2026-03-15. Last rotation: 2025-06-01."}
  {"index":{"_index":"app-213-backend-config"}}
  {"@timestamp":"2025-06-14T12:00:00Z","routing_group":"routing-group-3","upstream_host":"db-node-3.internal","upstream_port":5432,"ssl_cert_path":"/etc/certs/db-node-3-2026.pem","ssl_verify":true,"max_connections":100,"health_status":"healthy","last_config_change":"2025-06-01T08:00:00Z","config_audit_id":"CFG-AUDIT-c9d0e1f2","notes":"Standard configuration. Certificate valid until 2026-03-15. Last rotation: 2025-06-01."}
  {"index":{"_index":"app-213-backend-config"}}
  {"@timestamp":"2025-06-14T12:00:00Z","routing_group":"routing-group-4","upstream_host":"db-node-4.internal","upstream_port":5432,"ssl_cert_path":"/etc/certs/db-node-4-2026.pem","ssl_verify":true,"max_connections":100,"health_status":"healthy","last_config_change":"2025-06-01T08:00:00Z","config_audit_id":"CFG-AUDIT-a3b4c5d6","notes":"Standard configuration. Certificate valid until 2026-03-15. Last rotation: 2025-06-01."}
  {"index":{"_index":"app-213-backend-config"}}
  {"@timestamp":"2025-06-14T22:30:00Z","routing_group":"routing-group-5","upstream_host":"db-node-5.internal","upstream_port":5432,"ssl_cert_path":"/etc/certs/db-node-5-expired-20250601.pem","ssl_verify":true,"max_connections":100,"health_status":"degraded","last_config_change":"2025-06-14T22:30:00Z","config_audit_id":"CFG-AUDIT-m7k2p9x4","notes":"Certificate was renewed on 2025-06-01 but ssl_cert_path still references the old expired certificate file. New cert is at /etc/certs/db-node-5-2026.pem but config was not updated. TLS handshake failures expected until path is corrected. Ticket INFRA-4471 open."}
  {"index":{"_index":"app-213-backend-config"}}
  {"@timestamp":"2025-06-14T12:00:00Z","routing_group":"routing-group-6","upstream_host":"db-node-6.internal","upstream_port":5432,"ssl_cert_path":"/etc/certs/db-node-6-2026.pem","ssl_verify":true,"max_connections":100,"health_status":"healthy","last_config_change":"2025-06-01T08:00:00Z","config_audit_id":"CFG-AUDIT-e7f8a9b0","notes":"Standard configuration. Certificate valid until 2026-03-15. Last rotation: 2025-06-01."}
  {"index":{"_index":"app-213-backend-config"}}
  {"@timestamp":"2025-06-14T12:00:00Z","routing_group":"routing-group-7","upstream_host":"db-node-7.internal","upstream_port":5432,"ssl_cert_path":"/etc/certs/db-node-7-2026.pem","ssl_verify":true,"max_connections":100,"health_status":"healthy","last_config_change":"2025-06-01T08:00:00Z","config_audit_id":"CFG-AUDIT-c1d2e3f4","notes":"Standard configuration. Certificate valid until 2026-03-15. Last rotation: 2025-06-01."}
  {"index":{"_index":"app-213-backend-config"}}
  {"@timestamp":"2025-06-14T12:00:00Z","routing_group":"routing-group-8","upstream_host":"db-node-8.internal","upstream_port":5432,"ssl_cert_path":"/etc/certs/db-node-8-2026.pem","ssl_verify":true,"max_connections":100,"health_status":"healthy","last_config_change":"2025-06-01T08:00:00Z","config_audit_id":"CFG-AUDIT-a5b6c7d8","notes":"Standard configuration. Certificate valid until 2026-03-15. Last rotation: 2025-06-01."}
  BULK_EOF
  sed -i 's/^  //' "$BULK_FILE"

  curl -sf -X POST "${ELASTICSEARCH_URL}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE" > /dev/null
  rm -f "$BULK_FILE"

  # Refresh and verify
  echo "⏳ Refreshing indices..."
  curl -sf -X POST "${ELASTICSEARCH_URL}/app-213-*/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  sleep 2

  echo "⏳ Verifying indices..."
  ALL_GOOD=true

  # Verify request logs count
  REQ_COUNT=$(curl -sf -X GET "${ELASTICSEARCH_URL}/app-213-request-logs/_count" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" | grep -o '"count":[0-9]*' | cut -d':' -f2)
  if [ "$REQ_COUNT" -ge 290 ]; then
    echo "  ✅ app-213-request-logs: ${REQ_COUNT} documents"
  else
    echo "  ❌ app-213-request-logs: expected ~300, got ${REQ_COUNT}"
    ALL_GOOD=false
  fi

  # Verify config count
  CFG_COUNT=$(curl -sf -X GET "${ELASTICSEARCH_URL}/app-213-backend-config/_count" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" | grep -o '"count":[0-9]*' | cut -d':' -f2)
  if [ "$CFG_COUNT" -eq 8 ]; then
    echo "  ✅ app-213-backend-config: ${CFG_COUNT} documents"
  else
    echo "  ❌ app-213-backend-config: expected 8, got ${CFG_COUNT}"
    ALL_GOOD=false
  fi

  # Verify error distribution - routing-group-5 should have high error rate
  RG5_ERRORS=$(curl -sf -X POST "${ELASTICSEARCH_URL}/app-213-request-logs/_count" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"query":{"bool":{"must":[{"term":{"routing_group":"routing-group-5"}},{"term":{"status_code":500}}]}}}' \
    | grep -o '"count":[0-9]*' | cut -d':' -f2)
  RG5_TOTAL=$(curl -sf -X POST "${ELASTICSEARCH_URL}/app-213-request-logs/_count" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"query":{"term":{"routing_group":"routing-group-5"}}}' \
    | grep -o '"count":[0-9]*' | cut -d':' -f2)
  if [ "$RG5_TOTAL" -ge 30 ] && [ "$RG5_ERRORS" -ge 25 ]; then
    echo "  ✅ routing-group-5: ${RG5_ERRORS}/${RG5_TOTAL} errors (target: ~85%)"
  else
    echo "  ❌ routing-group-5: ${RG5_ERRORS}/${RG5_TOTAL} errors - expected ~85% error rate with 30+ requests"
    ALL_GOOD=false
  fi

  # Verify config audit code exists
  VERIFY=$(curl -sf -X POST "${ELASTICSEARCH_URL}/app-213-backend-config/_search" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"query":{"term":{"config_audit_id":"CFG-AUDIT-m7k2p9x4"}},"size":1}')
  HITS=$(echo "$VERIFY" | grep -o '"total":{"value":[0-9]*' | head -1 | grep -o '[0-9]*$')
  if [ "$HITS" -ge 1 ]; then
    echo "  ✅ Verification code CFG-AUDIT-m7k2p9x4 found in backend-config"
  else
    echo "  ❌ Verification code not found!"
    ALL_GOOD=false
  fi

  if [ "$ALL_GOOD" = true ]; then
    echo "✅ All indices created and verified successfully"
  else
    echo "❌ Some indices failed verification"
    exit 1
  fi

after_test: |
  echo "⏳ Cleaning up test indices..."
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-213-*" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  echo "✅ Cleanup complete"
