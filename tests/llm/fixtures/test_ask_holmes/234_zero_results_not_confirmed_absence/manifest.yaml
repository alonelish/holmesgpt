apiVersion: v1
kind: Namespace
metadata:
  name: app-234
---
# A healthy deployment that IS present - red herring
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-script
  namespace: app-234
type: Opaque
stringData:
  app.sh: |
    #!/bin/sh
    echo "Notification service v1.8.0 starting..."
    while true; do
      echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO  notification-service - Sent email notification to user_12345 [template=order_confirmed]"
      echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO  notification-service - Sent push notification to device_abc [template=shipping_update]"
      echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO  notification-service - Queue depth: 3 messages pending"
      sleep 5
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: app-234
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: busybox:1.36
        command: ["sh", "/scripts/app.sh"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
        volumeMounts:
        - name: app-code
          mountPath: /scripts
      volumes:
      - name: app-code
        secret:
          secretName: notification-service-script
          defaultMode: 0755
