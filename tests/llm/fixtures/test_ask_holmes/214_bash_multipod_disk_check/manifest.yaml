# 7 pods with small /tmp usage
---
apiVersion: v1
kind: Pod
metadata:
  name: cache-worker-1
  namespace: app-214
  labels:
    app: cache-worker
spec:
  containers:
    - name: worker
      image: alpine:3.19
      command: ["/bin/sh", "-c", "dd if=/dev/urandom of=/tmp/cache.dat bs=1K count=100 2>/dev/null; sleep 3600"]
      resources:
        limits:
          memory: "64Mi"
          cpu: "100m"
---
