# StatefulSet with 100 cache-worker pods
# Pods 0-89: small /tmp (100KB)
# Pods 90-99: large /tmp (60MB) - these should be flagged
apiVersion: v1
kind: Service
metadata:
  name: cache-worker
  namespace: app-214
spec:
  clusterIP: None
  selector:
    app: cache-worker
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache-worker
  namespace: app-214
spec:
  serviceName: cache-worker
  replicas: 100
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: cache-worker
  template:
    metadata:
      labels:
        app: cache-worker
    spec:
      containers:
        - name: worker
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              POD_ID=$(hostname | sed 's/cache-worker-//')
              # Pods 90-99 get large files (60MB), others get small (100KB)
              if [ "$POD_ID" -ge 90 ]; then
                dd if=/dev/zero of=/tmp/cache.dat bs=1M count=60 2>/dev/null
              else
                dd if=/dev/zero of=/tmp/cache.dat bs=1K count=100 2>/dev/null
              fi
              sleep 3600
          resources:
            limits:
              memory: "128Mi"
              cpu: "50m"
            requests:
              memory: "32Mi"
              cpu: "10m"
