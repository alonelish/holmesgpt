user_prompt: "Write a bash script with a for-loop to check disk usage inside all cache-worker pods in namespace app-214. The script should iterate over all pods and report which have /tmp usage over 50MB."

include_tool_calls: true

expected_output:
  - "The bash command must contain a for-loop (e.g., 'for pod in' or 'for i in')"
  - "Must NOT make separate kubectl exec calls for each pod - must use a single bash script"
  - "Must identify cache-worker-8, cache-worker-9, and cache-worker-10 as having high disk usage"

description: |
  TDD test: This test should FAIL until the bash toolset supports loop constructs.
  The bash toolset currently blocks for/while loops, so Holmes cannot write the required script.
  10 pods are deployed: 7 have small /tmp usage, 3 have >50MB in /tmp.
  This test validates that we need to add loop support to the bash toolset.

tags:
  - kubernetes
  - regression
  - bash-resource-checker

before_test: |
  kubectl create namespace app-214 --dry-run=client -o yaml | kubectl apply -f -
  kubectl apply -f manifest.yaml

  # Wait for all pods to be ready
  PODS_READY=false
  for i in {1..90}; do
    READY_COUNT=$(kubectl get pods -n app-214 -l app=cache-worker --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l | tr -d ' ')
    echo "Attempt $i: $READY_COUNT/10 pods ready"
    if [ "$READY_COUNT" -ge 10 ]; then
      echo "All 10 pods ready!"
      PODS_READY=true
      break
    fi
    sleep 1
  done

  if [ "$PODS_READY" = false ]; then
    echo "Not all pods ready"
    kubectl get pods -n app-214
    exit 1
  fi

  # Wait for files to be created in pods
  FILES_READY=false
  for i in {1..30}; do
    # Check that pod 10 has large files
    LARGE_SIZE=$(kubectl exec -n app-214 cache-worker-10 -- du -sm /tmp 2>/dev/null | cut -f1 || echo "0")
    echo "Attempt $i: cache-worker-10 /tmp size: ${LARGE_SIZE}MB"
    if [ "$LARGE_SIZE" -gt 50 ]; then
      echo "Large files created!"
      FILES_READY=true
      break
    fi
    sleep 2
  done

  if [ "$FILES_READY" = false ]; then
    echo "Files not created properly in high-usage pods"
    kubectl exec -n app-214 cache-worker-10 -- du -sh /tmp
    exit 1
  fi
  echo "Setup complete"

after_test: |
  kubectl delete namespace app-214 --ignore-not-found
