user_prompt: "Check disk usage inside all cache-worker pods in namespace app-214. Which pods have /tmp usage over 50MB?"

include_tool_calls: true

expected_output:
  - "Must identify cache-worker-90 through cache-worker-99 as having high disk usage"
  - "Must check all 100 pods"

description: |
  TDD test: 100 pods deployed - too many for individual kubectl exec calls.
  Holmes needs to write a bash script with a loop, but bash toolset blocks loops.
  Pods 0-89 have small /tmp, pods 90-99 have >50MB in /tmp.

tags:
  - kubernetes
  - regression
  - bash-resource-checker

before_test: |
  kubectl create namespace app-214 --dry-run=client -o yaml | kubectl apply -f -
  kubectl apply -f manifest.yaml

  # Wait for all pods to be ready
  PODS_READY=false
  for i in {1..180}; do
    READY_COUNT=$(kubectl get pods -n app-214 -l app=cache-worker --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l | tr -d ' ')
    echo "Attempt $i: $READY_COUNT/100 pods ready"
    if [ "$READY_COUNT" -ge 100 ]; then
      echo "All 100 pods ready!"
      PODS_READY=true
      break
    fi
    sleep 1
  done

  if [ "$PODS_READY" = false ]; then
    echo "Not all pods ready"
    kubectl get pods -n app-214
    exit 1
  fi

  # Wait for files to be created in pods
  FILES_READY=false
  for i in {1..30}; do
    # Check that pod 99 has large files (StatefulSet pods are 0-indexed)
    LARGE_SIZE=$(kubectl exec -n app-214 cache-worker-99 -- du -sm /tmp 2>/dev/null | cut -f1 || echo "0")
    echo "Attempt $i: cache-worker-99 /tmp size: ${LARGE_SIZE}MB"
    if [ "$LARGE_SIZE" -gt 50 ]; then
      echo "Large files created!"
      FILES_READY=true
      break
    fi
    sleep 2
  done

  if [ "$FILES_READY" = false ]; then
    echo "Files not created properly in high-usage pods"
    kubectl exec -n app-214 cache-worker-99 -- du -sh /tmp
    exit 1
  fi
  echo "Setup complete"

after_test: |
  kubectl delete namespace app-214 --ignore-not-found
