# Test: Coralogix Log Search with DataPrime
# Tests that Holmes can search logs using Coralogix DataPrime query language
#
# This is a fast cloud-only test that writes logs directly to Coralogix via REST API,
# no Kubernetes cluster required.
#
# Requirements:
# - CORALOGIX_SEND_API_KEY: API key with SendData permissions (for ingestion)
# - CORALOGIX_API_KEY: API key with DataQuerying permissions (for queries)
#
# Note: Coralogix uses separate API keys for sending vs querying data.
# See: https://coralogix.com/docs/user-guides/account-management/api-keys/api-keys/
#
# Anti-hallucination: Uses unique EVAL_RUN_ID in application name to prevent
# tests from succeeding on cached data from previous runs.

user_prompt: "Search the Coralogix logs for the 'order-service-{{ env.EVAL_RUN_ID }}' application. Find ERROR level messages and report what error codes (format ERR-XXXX) appear in the logs."

expected_output:
  - "Must find error code ERR-7291 associated with database connection timeout"
  - "Must find error code ERR-4058 associated with payment validation failure"
  - "Must find error code ERR-9463 associated with stock sync or inventory API failure"

tags:
  - coralogix
  - logs
  - medium

setup_timeout: 900

before_test: |
  set -e
  source ../../shared/coralogix/coralogix_test_utils.sh
  cx_setup

  echo "🚀 Setting up Coralogix logs test 211 (run_id: ${EVAL_RUN_ID})"

  # Use EVAL_RUN_ID in app name to ensure uniqueness per test run
  # This prevents tests from succeeding on cached data from previous runs
  APP_NAME="order-service-${EVAL_RUN_ID}"
  SUBSYSTEM="payment-api"

  # Define the specific error codes for anti-hallucination testing
  ERROR_CODE_1="ERR-7291"
  ERROR_CODE_2="ERR-4058"
  ERROR_CODE_3="ERR-9463"

  echo "⏳ Sending logs to Coralogix for app: $APP_NAME..."

  # Build log entries JSON - Coralogix /singles API expects an ARRAY of entries
  # Each entry must include applicationName and subsystemName
  # See: https://coralogix.com/docs/developer-portal/apis/log-ingestion/coralogix-rest-api-singles/
  LOG_ENTRIES="[
    {\"applicationName\": \"$APP_NAME\", \"subsystemName\": \"$SUBSYSTEM\", \"severity\": 3, \"text\": \"Service started successfully - payment-api initialized\"},
    {\"applicationName\": \"$APP_NAME\", \"subsystemName\": \"$SUBSYSTEM\", \"severity\": 5, \"text\": \"Database connection timeout - $ERROR_CODE_1: Failed to connect to primary database after 30s\"},
    {\"applicationName\": \"$APP_NAME\", \"subsystemName\": \"$SUBSYSTEM\", \"severity\": 4, \"text\": \"Retrying database connection attempt 1\"},
    {\"applicationName\": \"$APP_NAME\", \"subsystemName\": \"$SUBSYSTEM\", \"severity\": 5, \"text\": \"Payment validation failed - $ERROR_CODE_2: Invalid card number format for user U-12345\"},
    {\"applicationName\": \"$APP_NAME\", \"subsystemName\": \"$SUBSYSTEM\", \"severity\": 3, \"text\": \"Processing order batch complete - 150 orders processed\"},
    {\"applicationName\": \"$APP_NAME\", \"subsystemName\": \"$SUBSYSTEM\", \"severity\": 5, \"text\": \"Stock sync failed - $ERROR_CODE_3: External inventory API returned 503\"}
  ]"

  # Send logs via REST API
  INGRESS_URL=$(cx_ingress_url)

  # Use unique temp file to avoid parallel test collisions
  RESPONSE_FILE=$(mktemp)
  trap "rm -f $RESPONSE_FILE" EXIT

  # Check HTTP status code to validate write succeeded
  HTTP_CODE=$(curl -sk -o "$RESPONSE_FILE" -w "%{http_code}" -X POST "${INGRESS_URL}/logs/v1/singles" \
    -H "Authorization: Bearer ${CORALOGIX_SEND_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "$LOG_ENTRIES")
  RESPONSE=$(cat "$RESPONSE_FILE" 2>/dev/null || echo "")

  echo "   Ingestion HTTP status: $HTTP_CODE"
  echo "   Ingestion response: $RESPONSE"

  # Validate write succeeded - must get HTTP 200
  if [ "$HTTP_CODE" != "200" ]; then
    echo "❌ Ingestion failed with HTTP $HTTP_CODE"
    echo "   This usually means CORALOGIX_SEND_API_KEY is invalid or has wrong permissions"
    exit 1
  fi

  if echo "$RESPONSE" | grep -q "Dropped"; then
    echo "❌ Logs were dropped by Coralogix: $RESPONSE"
    exit 1
  fi

  echo "✅ Logs sent to $APP_NAME/$SUBSYSTEM (HTTP 200)"

  # Wait for logs to be queryable (Coralogix has some ingestion delay)
  echo "⏳ Waiting for logs to be queryable in Coralogix..."
  QUERY_URL=$(cx_query_url)

  # Calculate time range for query (1 hour ago to now)
  START_DATE=$(date -u -d '1 hour ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-1H '+%Y-%m-%dT%H:%M:%SZ')
  END_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
  echo "   Query time range: $START_DATE to $END_DATE"

  LOGS_READY=false
  for i in {1..180}; do
    # Search for the error code using lucene full-text search
    # Note: lucene does full-text search across all fields including userData JSON
    JSON_PAYLOAD=$(jq -n \
      --arg query "source logs | lucene '$ERROR_CODE_1' | limit 1" \
      --arg start "$START_DATE" \
      --arg end "$END_DATE" \
      '{query: $query, metadata: {syntax: "QUERY_SYNTAX_DATAPRIME", startDate: $start, endDate: $end}}')
    RESULT=$(curl -sk --max-time 60 -X POST "$QUERY_URL" \
      -H "Authorization: Bearer ${CORALOGIX_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "$JSON_PAYLOAD" 2>/dev/null || true)

    # Debug: print full response periodically
    if [ "$i" -eq 1 ] || [ "$((i % 10))" -eq 0 ]; then
      echo "   Debug query response (attempt $i, ${#RESULT} bytes): ${RESULT:0:500}"
    fi

    if echo "$RESULT" | grep -q "$ERROR_CODE_1"; then
      echo "✅ Logs are queryable after $((i * 5)) seconds"
      LOGS_READY=true
      break
    fi

    echo "   Attempt $i/180: Logs not yet indexed, waiting 5s..."
    sleep 5
  done

  if [ "$LOGS_READY" = false ]; then
    echo "❌ Timeout waiting for logs to be queryable"
    echo "   This could mean:"
    echo "   - CORALOGIX_API_KEY doesn't have DataQuerying permissions"
    echo "   - Logs were sent to a different Coralogix team than the query key"
    echo "   - Coralogix indexing is experiencing delays"
    exit 1
  fi

  # Verify all 3 error codes are queryable
  echo "🔍 Verifying all error codes are queryable..."
  for CODE in $ERROR_CODE_1 $ERROR_CODE_2 $ERROR_CODE_3; do
    JSON_PAYLOAD=$(jq -n \
      --arg query "source logs | lucene '$CODE' | limit 1" \
      --arg start "$START_DATE" \
      --arg end "$END_DATE" \
      '{query: $query, metadata: {syntax: "QUERY_SYNTAX_DATAPRIME", startDate: $start, endDate: $end}}')
    VERIFY=$(curl -sk --max-time 30 -X POST "$QUERY_URL" \
      -H "Authorization: Bearer ${CORALOGIX_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "$JSON_PAYLOAD" 2>/dev/null || true)

    if ! echo "$VERIFY" | grep -q "$CODE"; then
      echo "❌ Could not find error code $CODE"
      echo "   Query result: $VERIFY"
      exit 1
    fi
    echo "   ✓ Found $CODE"
  done

  echo "✅ Test setup complete! App: $APP_NAME"

after_test: |
  # No cleanup needed - logs will naturally age out of Coralogix
  # The application name includes EVAL_RUN_ID so it's unique to this test run
  echo "✅ Cleanup complete (logs will age out naturally)"
