# Coralogix toolset configuration for test 211
# Cloud-only test - no Kubernetes required

toolsets:
  coralogix:
    enabled: true
    config:
      api_key: "{{env.CORALOGIX_API_KEY}}"
      domain: "eu2.coralogix.com"
      # team_slug is optional - only needed for clickable UI permalink URLs

  # Disable toolsets that require local infrastructure (cloud-only test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
