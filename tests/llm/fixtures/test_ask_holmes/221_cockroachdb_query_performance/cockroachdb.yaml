apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockroachdb
  namespace: app-221
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cockroachdb
  template:
    metadata:
      labels:
        app: cockroachdb
    spec:
      containers:
      - name: cockroachdb
        image: cockroachdb/cockroach:v24.3.4
        command:
          - /cockroach/cockroach
          - start-single-node
          - --insecure
          - --store=type=mem,size=1GB
        ports:
        - containerPort: 26257
          name: sql
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health?ready=1
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb
  namespace: app-221
spec:
  selector:
    app: cockroachdb
  ports:
  - port: 26257
    targetPort: 26257
    name: sql
  - port: 8080
    targetPort: 8080
    name: http
