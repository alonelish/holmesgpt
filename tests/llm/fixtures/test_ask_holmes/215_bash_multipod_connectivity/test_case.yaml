user_prompt: "Verify that all api-worker pods in namespace app-215 can reach the database service on port 5432. Report which pods have connectivity issues."

include_tool_calls: true

expected_output:
  - "Must call bash tool with kubectl exec"
  - "Must test connectivity from multiple pods"
  - "Must identify api-worker-8, api-worker-9, and api-worker-10 as having connectivity issues"
  - "Pods api-worker-1 through api-worker-7 should successfully connect"

description: |
  Tests that Holmes can use bash to run kubectl exec with nc/wget to test network connectivity.
  10 worker pods are deployed along with a database service.
  NetworkPolicy blocks 3 pods (api-worker-8,9,10) from reaching the database.
  Holmes must iterate over pods and test connectivity since no toolset does in-pod network testing.

tags:
  - kubernetes
  - regression
  - bash-resource-checker

before_test: |
  kubectl create namespace app-215 --dry-run=client -o yaml | kubectl apply -f -
  kubectl apply -f manifest.yaml

  # Wait for all pods to be ready
  PODS_READY=false
  for i in {1..90}; do
    READY_COUNT=$(kubectl get pods -n app-215 --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l | tr -d ' ')
    echo "Attempt $i: $READY_COUNT/11 pods ready (10 workers + 1 db)"
    if [ "$READY_COUNT" -ge 11 ]; then
      echo "All pods ready!"
      PODS_READY=true
      break
    fi
    sleep 1
  done

  if [ "$PODS_READY" = false ]; then
    echo "Not all pods ready"
    kubectl get pods -n app-215
    exit 1
  fi

  # Verify database service is accessible from allowed pod
  DB_CHECK=false
  for i in {1..30}; do
    if kubectl exec -n app-215 api-worker-1 -- nc -zv -w 2 database 5432 2>&1 | grep -q "open\|succeeded"; then
      echo "Database connectivity verified from allowed pod"
      DB_CHECK=true
      break
    fi
    sleep 1
  done

  if [ "$DB_CHECK" = false ]; then
    echo "Database service not accessible from allowed pod"
    kubectl exec -n app-215 api-worker-1 -- nc -zv -w 2 database 5432
    exit 1
  fi

  # Verify blocked pod cannot connect
  BLOCK_CHECK=false
  if ! kubectl exec -n app-215 api-worker-10 -- nc -zv -w 2 database 5432 2>&1 | grep -q "open\|succeeded"; then
    echo "NetworkPolicy blocking verified - api-worker-10 cannot reach database"
    BLOCK_CHECK=true
  fi

  if [ "$BLOCK_CHECK" = false ]; then
    echo "WARNING: NetworkPolicy may not be working - blocked pod can reach database"
  fi

  echo "Setup complete"

after_test: |
  kubectl delete namespace app-215 --ignore-not-found
