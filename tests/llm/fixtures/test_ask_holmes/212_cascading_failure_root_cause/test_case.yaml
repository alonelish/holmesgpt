# Test: Cascading Microservice Failure - Root Cause Analysis
# Tests Holmes's ability to perform multi-index temporal correlation and identify
# the true root cause in a cascading failure scenario with multiple red herrings.
#
# Difficulty: HARD
# - 6 indices with ~170 documents total
# - Root cause evidence is ONLY in INFO-level logs (not in any ERROR message)
# - Red herring #1: metrics-collector has errors BEFORE the root cause timeline
# - Red herring #2: frontend-api had a deployment minutes before the incident
# - Red herring #3: order-processing has slow payment warnings (unrelated)
# - Red herring #4: database maintenance completed just before incident
# - data-pipeline ERROR messages say "batch timeout" with NO mention of connections
# - Requires reading INFO-level diagnostic dumps to find the actual root cause
# - Must follow dependency chain backwards through indirect evidence
#
# Requirements:
# - ELASTICSEARCH_URL: URL to Elasticsearch cluster
# - ELASTICSEARCH_API_KEY: API key for authentication
#
# Anti-hallucination: A unique diagnostic code LEAK-DIAG-8f3a9v2x is embedded
# in an INFO-level diagnostic dump in the data-pipeline index. The LLM must
# look beyond ERROR-level messages to find it.

user_prompt: >
  Users are reporting failed checkout attempts and HTTP 502 errors.
  We have application logs from multiple services stored in Elasticsearch
  indices prefixed with 'app-212-'. Investigate the issue across all
  service logs to determine what is causing the failures. Identify which
  service is the origin of the problem and what specifically went wrong.

expected_output:
  - "Must identify the 'data-pipeline' service (app-212-data-pipeline index) as the root cause or origin of the problem, NOT frontend-api, NOT metrics-collector, NOT database maintenance"
  - "Must mention connection pool exhaustion or connection leak as the underlying issue in data-pipeline"
  - "Must report the diagnostic code LEAK-DIAG-8f3a9v2x which is only found in data-pipeline INFO-level health snapshots"
  - "Must NOT attribute the root cause to the database maintenance window, the deployment on frontend-api, or the metrics-collector errors"

tags:
  - elasticsearch
  - chain-of-causation
  - hard

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  INDICES=(
    "app-212-frontend-api"
    "app-212-order-processing"
    "app-212-stock-management"
    "app-212-data-pipeline"
    "app-212-metrics-collector"
    "app-212-platform-events"
  )

  # Clean up any existing test indices
  echo "⏳ Cleaning up existing test indices..."
  for idx in "${INDICES[@]}"; do
    curl -sf -X DELETE "${ELASTICSEARCH_URL}/${idx}" \
      -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  done

  # Create index template for all test indices
  echo "⏳ Creating index template..."
  curl -sf -X PUT "${ELASTICSEARCH_URL}/_index_template/app-212-template" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "index_patterns": ["app-212-*"],
      "template": {
        "settings": {
          "number_of_shards": 1,
          "number_of_replicas": 0
        },
        "mappings": {
          "properties": {
            "@timestamp": {"type": "date"},
            "level": {"type": "keyword"},
            "service": {"type": "keyword"},
            "component": {"type": "keyword"},
            "host": {"type": "keyword"},
            "trace_id": {"type": "keyword"},
            "message": {"type": "text", "fields": {"keyword": {"type": "keyword", "ignore_above": 512}}}
