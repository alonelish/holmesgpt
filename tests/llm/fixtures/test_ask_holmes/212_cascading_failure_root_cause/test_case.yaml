  BULK_EOF
  sed -i 's/^  //' "$BULK_FILE"

  curl -sf -X POST "${ELASTICSEARCH_URL}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE" > /dev/null
  rm -f "$BULK_FILE"

  # =========================================================================
  # INDEX 6: app-212-platform-events (10 docs) - RED HERRING
  # Platform events showing database maintenance that completed just before
  # the incident - designed to mislead into thinking DB maintenance caused issues
  # =========================================================================
  echo "⏳ Creating app-212-platform-events data (RED HERRING)..."
  BULK_FILE=$(es_temp_file "bulk" "212-events")
  cat > "$BULK_FILE" << 'BULK_EOF'
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T13:55:00Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Scheduled maintenance window STARTED for db-primary.internal:5432. Task: index rebuild on tables [inventory, transactions, product_catalog]. Estimated duration: 15 minutes."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T13:55:30Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Database maintenance: REINDEX CONCURRENTLY started on table 'inventory' (db-primary.internal:5432). This may cause temporary query slowdowns."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T13:58:00Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Database maintenance: REINDEX CONCURRENTLY completed on table 'inventory'. Duration: 150s. Index size: 2.3GB -> 1.8GB."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T13:58:30Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Database maintenance: REINDEX CONCURRENTLY started on table 'transactions' (db-primary.internal:5432)."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T14:04:00Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Database maintenance: REINDEX CONCURRENTLY completed on table 'transactions'. Duration: 330s. Index size: 8.1GB -> 6.9GB."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T14:04:30Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Database maintenance: REINDEX CONCURRENTLY started on table 'product_catalog' (db-primary.internal:5432)."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T14:08:00Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Database maintenance: REINDEX CONCURRENTLY completed on table 'product_catalog'. Duration: 210s. Index size: 1.1GB -> 0.9GB."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T14:08:30Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Scheduled maintenance window COMPLETED for db-primary.internal:5432. All 3 reindex operations successful. Total duration: 810s. Database health check: PASSED. All connections operational."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T14:09:00Z","level":"INFO","service":"platform-ops","component":"maintenance-scheduler","host":"ip-10-0-1-10","message":"Post-maintenance verification: db-primary.internal:5432 query response time p99=12ms (baseline: 10ms). Connection pool capacity: normal. Autovacuum running on recently reindexed tables."}
  {"index":{"_index":"app-212-platform-events"}}
  {"@timestamp":"2025-06-15T14:15:00Z","level":"INFO","service":"platform-ops","component":"alert-router","host":"ip-10-0-1-10","message":"Alert triggered: stock-management service health check FAILED. Alert routed to on-call team. Incident ticket INC-20250615-042 created."}
  BULK_EOF
  sed -i 's/^  //' "$BULK_FILE"

  curl -sf -X POST "${ELASTICSEARCH_URL}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE" > /dev/null
  rm -f "$BULK_FILE"

  # =========================================================================
  # Refresh all indices and verify
  # =========================================================================
  echo "⏳ Refreshing indices..."
  curl -sf -X POST "${ELASTICSEARCH_URL}/app-212-*/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  sleep 2

  echo "⏳ Verifying indices..."
  ALL_GOOD=true
  for idx in "${INDICES[@]}"; do
    DOC_COUNT=$(curl -sf -X GET "${ELASTICSEARCH_URL}/${idx}/_count" \
      -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" | grep -o '"count":[0-9]*' | cut -d':' -f2)
    if [ -z "$DOC_COUNT" ] || [ "$DOC_COUNT" -eq 0 ]; then
      echo "❌ Index ${idx} has no documents"
      ALL_GOOD=false
    else
      echo "  ✅ ${idx}: ${DOC_COUNT} documents"
    fi
  done

  # Verify the root cause verification code exists
  VERIFY=$(curl -sf -X POST "${ELASTICSEARCH_URL}/app-212-data-pipeline/_search" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"query":{"match":{"message":"LEAK-DIAG-8f3a9v2x"}},"size":1}')

  HITS=$(echo "$VERIFY" | grep -o '"total":{"value":[0-9]*' | head -1 | grep -o '[0-9]*$')
  if [ "$HITS" -ge 1 ]; then
    echo "  ✅ Verification code LEAK-DIAG-8f3a9v2x found in data-pipeline"
  else
    echo "❌ Verification code not found!"
    ALL_GOOD=false
  fi

  if [ "$ALL_GOOD" = true ]; then
    echo "✅ All 5 indices created and verified successfully"
  else
    echo "❌ Some indices failed verification"
    exit 1
  fi

after_test: |
  echo "⏳ Cleaning up test indices..."
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-212-*" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/_index_template/app-212-template" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  echo "✅ Cleanup complete"
