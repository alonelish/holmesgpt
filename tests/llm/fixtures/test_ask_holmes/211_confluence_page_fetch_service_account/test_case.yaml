# Test: Fetch Confluence page from URL (page ID in URL) - Service Account Auth
# Tests that Holmes can fetch a page when given a full URL with page ID.
# Uses the generic HTTP toolset to access Confluence REST API with service account auth.
#
# Auth Method: Service Account (Bearer token via api.atlassian.com gateway)
# URL Pattern: https://api.atlassian.com/ex/confluence/{cloudId}/wiki/rest/api/...
#
# The LLM must discover the cloudId by calling /oauth/token/accessible-resources
# and matching the URL from the user's question.
#
# Requirements:
#   CONFLUENCE_SERVICE_ACCOUNT_TOKEN - Service account API token (Bearer)

user_prompt: |
  Fetch the contents of this Confluence page and tell me the AWS account ID mentioned on it:
  https://robusta-llm-test.atlassian.net/wiki/spaces/MFS/pages/2424833/AWS+Account+ID

expected_output:
  - "FAIL if fetch_webpage tool was called - this tool must never be used for Confluence pages"
  - "FAIL if fetch_runbook tool was called - this tool must never be used for Confluence pages"
  - "Must call http_request tool to discover cloudId via /oauth/token/accessible-resources OR use the correct cloudId"
  - "Must call http_request tool to fetch the Confluence page via api.atlassian.com gateway"
  - "Must report the AWS account ID: 938401784103"

include_tool_calls: true

tags:
  - confluence
  - confluence-service-account
  - question-answer
  - medium
