apiVersion: v1
kind: Pod
metadata:
  name: data-cruncher
  namespace: app-211
  labels:
    app: data-cruncher
spec:
  containers:
    - name: worker
      image: alpine:3.19
      command:
        - /bin/sh
        - -c
        - |
          # Create 95 normal sleep processes (minimal memory)
          for i in $(seq 1 95); do
            sleep 3600 &
          done

          # Create 5 memory-hungry processes using /dev/shm
          for i in $(seq 1 5); do
            (
              # Allocate ~20MB per process by writing to tmpfs
              dd if=/dev/zero of=/dev/shm/memhog_$i bs=1M count=20 2>/dev/null
              sleep 3600
            ) &
          done

          # Keep container running
          sleep 3600
      resources:
        limits:
          memory: "256Mi"
          cpu: "200m"
        requests:
          memory: "128Mi"
          cpu: "100m"
