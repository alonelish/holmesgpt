apiVersion: v1
kind: Pod
metadata:
  name: data-cruncher
  namespace: app-211
  labels:
    app: data-cruncher
spec:
  containers:
    - name: worker
      image: python:3.11-alpine
      command:
        - /bin/sh
        - -c
        - |
          # Create 95 normal sleep processes (minimal memory)
          for i in $(seq 1 95); do
            sleep 3600 &
          done

          # Create 5 memory-hungry Python processes (~20MB each)
          for i in $(seq 1 5); do
            python3 -c "
          import time
          # Allocate ~20MB of memory
          data = bytearray(20 * 1024 * 1024)
          # Fill with data to ensure it's allocated
          for j in range(0, len(data), 4096):
              data[j] = 0xff
          time.sleep(3600)
          " &
          done

          # Keep container running
          sleep 3600
      resources:
        limits:
          memory: "256Mi"
          cpu: "200m"
        requests:
          memory: "128Mi"
          cpu: "100m"
