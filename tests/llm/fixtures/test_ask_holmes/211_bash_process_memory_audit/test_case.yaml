user_prompt: "The data-cruncher pod in namespace app-211 is consuming too much memory. Check which processes inside the container are using the most memory and identify any that stand out."

include_tool_calls: true

expected_output:
  - "Must call bash tool with kubectl exec"
  - "Must identify the memory-hog process or processes consuming significant memory"
  - "Must report processes sorted by memory usage or identify top consumers"

description: |
  Tests that Holmes can use bash to run kubectl exec and inspect processes inside a container.
  The pod runs 100 sleep processes, but 5 of them allocate significant memory via /dev/shm.
  Holmes must use bash with 'kubectl exec' since no existing toolset can inspect in-container processes.

tags:
  - kubernetes
  - regression
  - bash-resource-checker

before_test: |
  kubectl create namespace app-211 --dry-run=client -o yaml | kubectl apply -f -
  kubectl apply -f manifest.yaml

  # Wait for pod to be ready
  POD_READY=false
  for i in {1..60}; do
    if kubectl wait --for=condition=ready pod/data-cruncher -n app-211 --timeout=2s 2>/dev/null; then
      echo "Pod ready!"
      POD_READY=true
      break
    fi
    sleep 1
  done

  if [ "$POD_READY" = false ]; then
    echo "Pod not ready after 60 seconds"
    kubectl get pods -n app-211
    kubectl describe pod/data-cruncher -n app-211
    exit 1
  fi

  # Verify processes are running inside the container
  PROC_COUNT=$(kubectl exec -n app-211 data-cruncher -- ps aux 2>/dev/null | wc -l)
  echo "Process count in container: $PROC_COUNT"
  if [ "$PROC_COUNT" -lt 50 ]; then
    echo "Not enough processes running in container"
    kubectl exec -n app-211 data-cruncher -- ps aux
    exit 1
  fi
  echo "Setup complete - container has $PROC_COUNT processes"

after_test: |
  kubectl delete namespace app-211 --ignore-not-found
