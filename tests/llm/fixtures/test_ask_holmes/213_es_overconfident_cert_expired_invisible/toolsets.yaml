toolsets:
  # Elasticsearch toolsets for this test
  elasticsearch/data:
    enabled: true
    config:
      url: "{{ env.ELASTICSEARCH_URL }}"
      api_key: "{{ env.ELASTICSEARCH_API_KEY }}"
      verify_ssl: true
  elasticsearch/cluster:
    enabled: true
    config:
      url: "{{ env.ELASTICSEARCH_URL }}"
      api_key: "{{ env.ELASTICSEARCH_API_KEY }}"
      verify_ssl: true

  # Disable toolsets that require external dependencies not available in this test
  helm/core:
    enabled: false
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
