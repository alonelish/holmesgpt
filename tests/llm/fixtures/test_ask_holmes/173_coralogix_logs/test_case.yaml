# Test: Coralogix Log Search with DataPrime
# Tests that Holmes can search logs using Coralogix DataPrime query language
#
# This is a fast cloud-only test that writes logs directly to Coralogix via REST API,
# no Kubernetes cluster required.
#
# Requirements:
# - CORALOGIX_SEND_API_KEY: API key with SendData permissions (for ingestion)
# - CORALOGIX_API_KEY: API key with DataQuerying permissions (for queries)
# - CORALOGIX_DOMAIN: e.g., "eu2.coralogix.com"
#
# Note: Coralogix uses separate API keys for sending vs querying data.
# See: https://coralogix.com/docs/user-guides/account-management/api-keys/api-keys/
#
# Anti-hallucination: The test injects 3 specific error codes (ERR-XXXX format).
# The LLM cannot know these codes without actually querying Coralogix.

user_prompt: "Search the Coralogix logs for the 'holmes-eval-173' application. Find ERROR level messages and report what error codes (format ERR-XXXX) appear in the logs."

expected_output:
  - "Must identify that there are ERROR level logs"
  - "Must find and list the 3 specific error codes: ERR-7291, ERR-4058, and ERR-9463"
  - "The response should mention the services or error messages associated with these codes"

tags:
  - coralogix
  - logs
  - medium

setup_timeout: 300

before_test: |
  source ../../shared/coralogix/coralogix_test_utils.sh
  cx_setup
  set -e

  echo "🚀 Setting up Coralogix logs test 173"

  APP_NAME="holmes-eval-173"
  SUBSYSTEM="payment-api"

  # Define the specific error codes for anti-hallucination testing
  ERROR_CODE_1="ERR-7291"
  ERROR_CODE_2="ERR-4058"
  ERROR_CODE_3="ERR-9463"

  # Get timestamps (Coralogix expects milliseconds since epoch)
  NOW=$(date +%s)
  TS1=$(( (NOW - 300) * 1000 ))
  TS2=$(( (NOW - 240) * 1000 ))
  TS3=$(( (NOW - 180) * 1000 ))
  TS4=$(( (NOW - 120) * 1000 ))
  TS5=$(( (NOW - 60) * 1000 ))
  TS6=$(( NOW * 1000 ))

  echo "⏳ Sending logs to Coralogix..."

  # Build log entries JSON (avoiding heredoc for YAML compatibility)
  LOG_ENTRIES="[{\"timestamp\": $TS1, \"severity\": 3, \"text\": \"Service started successfully - payment-api initialized\"}, {\"timestamp\": $TS2, \"severity\": 5, \"text\": \"Database connection timeout - $ERROR_CODE_1: Failed to connect to primary database after 30s\"}, {\"timestamp\": $TS3, \"severity\": 4, \"text\": \"Retrying database connection attempt 1\"}, {\"timestamp\": $TS4, \"severity\": 5, \"text\": \"Payment validation failed - $ERROR_CODE_2: Invalid card number format for user U-12345\"}, {\"timestamp\": $TS5, \"severity\": 3, \"text\": \"Processing order batch complete - 150 orders processed\"}, {\"timestamp\": $TS6, \"severity\": 5, \"text\": \"Stock sync failed - $ERROR_CODE_3: External inventory API returned 503\"}]"

  # Send logs via REST API
  INGRESS_URL="https://ingress.${CORALOGIX_DOMAIN}"

  RESPONSE=$(curl -sf -X POST "${INGRESS_URL}/logs/v1/singles" \
    -H "Authorization: Bearer ${CORALOGIX_SEND_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{\"applicationName\": \"$APP_NAME\", \"subsystemName\": \"$SUBSYSTEM\", \"logEntries\": $LOG_ENTRIES}" 2>&1)

  if [ $? -ne 0 ]; then
    echo "❌ Failed to send logs: $RESPONSE"
    exit 1
  fi

  echo "✅ Logs sent to $APP_NAME/$SUBSYSTEM"

  # Wait for logs to be queryable (Coralogix has some ingestion delay)
  echo "⏳ Waiting for logs to be queryable in Coralogix..."
  QUERY_URL="https://ng-api-http.${CORALOGIX_DOMAIN}/api/v1/dataprime/query"

  LOGS_READY=false
  for i in {1..60}; do
    # Use || true to prevent set -e from exiting on curl failure
    RESULT=$(curl -s -X POST "$QUERY_URL" \
      -H "Authorization: Bearer ${CORALOGIX_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "{\"query\": \"source logs | lucene 'holmes-eval-173 AND $ERROR_CODE_1' | limit 1\", \"metadata\": {\"syntax\": \"QUERY_SYNTAX_DATAPRIME\"}}" 2>/dev/null || true)

    if echo "$RESULT" | grep -q "$ERROR_CODE_1"; then
      echo "✅ Logs are queryable after $((i * 5)) seconds"
      LOGS_READY=true
      break
    fi

    echo "   Attempt $i/60: Logs not yet indexed, waiting 5s..."
    sleep 5
  done

  if [ "$LOGS_READY" = false ]; then
    echo "❌ Timeout waiting for logs to be queryable"
    exit 1
  fi

  # Verify all 3 error codes are queryable
  echo "🔍 Verifying all error codes are queryable..."
  for CODE in $ERROR_CODE_1 $ERROR_CODE_2 $ERROR_CODE_3; do
    VERIFY=$(curl -s -X POST "$QUERY_URL" \
      -H "Authorization: Bearer ${CORALOGIX_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "{\"query\": \"source logs | lucene 'holmes-eval-173 AND $CODE' | limit 1\", \"metadata\": {\"syntax\": \"QUERY_SYNTAX_DATAPRIME\"}}" 2>/dev/null || true)

    if ! echo "$VERIFY" | grep -q "$CODE"; then
      echo "❌ Could not find error code $CODE"
      exit 1
    fi
    echo "   ✓ Found $CODE"
  done

  echo "✅ Test setup complete!"

after_test: |
  # No cleanup needed - logs will naturally age out of Coralogix
  # The application name is unique to this test so it won't interfere with others
  echo "✅ Cleanup complete (logs will age out naturally)"
