apiVersion: v1
kind: Namespace
metadata:
  name: app-232
---
# Red herring: a healthy redis pod that has nothing to do with the asked-about service
apiVersion: v1
kind: Secret
metadata:
  name: cache-service-script
  namespace: app-232
type: Opaque
stringData:
  app.sh: |
    #!/bin/sh
    echo "Cache service starting..."
    while true; do
      echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO  cache-service - Handling request from payment-gateway: cache hit for session_abc123"
      echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO  cache-service - Handling request from payment-gateway: cache miss for session_def456"
      echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) WARN  cache-service - Connection from payment-gateway timed out after 30s"
      echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO  cache-service - Evicting stale entries: 12 removed"
      sleep 5
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-service
  namespace: app-232
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache-service
  template:
    metadata:
      labels:
        app: cache-service
    spec:
      containers:
      - name: cache-service
        image: busybox:1.36
        command: ["sh", "/scripts/app.sh"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
        volumeMounts:
        - name: app-code
          mountPath: /scripts
      volumes:
      - name: app-code
        secret:
          secretName: cache-service-script
          defaultMode: 0755
---
# Another red herring: a healthy nginx pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: app-232
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: nginx:1.25-alpine
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
