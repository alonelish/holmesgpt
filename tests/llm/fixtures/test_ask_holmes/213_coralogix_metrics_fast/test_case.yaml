# Test: Coralogix Metrics via Prometheus RemoteWrite
# Tests that Holmes can query metrics stored in Coralogix via PromQL
#
# This test sends real metrics via Prometheus RemoteWrite and queries via PromQL.
# Coralogix exposes a Prometheus-compatible query API at:
# https://api.<domain>/metrics/api/v1/query
#
# Requirements:
# - CORALOGIX_SEND_API_KEY: API key with SendData permissions (for ingestion)
# - CORALOGIX_API_KEY: API key with DataQuerying permissions (for queries)
#
# Anti-hallucination: Uses unique EVAL_RUN_ID in metric prefix to prevent
# tests from succeeding on cached data from previous runs.

user_prompt: "Query the Prometheus metrics to find HTTP request metrics with the 'eval_{{ env.EVAL_RUN_ID }}_' prefix. Tell me which endpoints have errors and report the error counts."

expected_output:
  - "Must identify metrics with the eval_<run_id>_ prefix"
  - "Must mention http_errors_total or similar error metric"
  - "Must identify endpoints /api/checkout and /api/cart have errors"
  - "Must report error count values like 12 (status 500) or 5 (status 503)"

tags:
  - coralogix
  - metrics
  - medium
  - fast

setup_timeout: 600

before_test: |
  set -e
  source ../../shared/coralogix/coralogix_test_utils.sh
  cx_setup

  echo "🚀 Setting up Coralogix metrics test 213 (run_id: ${EVAL_RUN_ID})"

  APP_NAME="holmes-eval-213"
  SUBSYSTEM="metrics-test"
  # Use EVAL_RUN_ID in metric prefix to ensure uniqueness per test run
  METRIC_PREFIX="eval_${EVAL_RUN_ID}"

  echo "⏳ Sending metrics to Coralogix via Prometheus RemoteWrite (prefix: ${METRIC_PREFIX})..."

  # Send metrics using the Python RemoteWrite script
  python3 ../../shared/coralogix/send_metrics.py \
    --api-key "$CORALOGIX_SEND_API_KEY" \
    --app-name "$APP_NAME" \
    --subsystem "$SUBSYSTEM" \
    --metric-prefix "$METRIC_PREFIX"

  if [ $? -ne 0 ]; then
    echo "❌ Failed to send metrics"
    echo "   This usually means CORALOGIX_SEND_API_KEY is invalid or has wrong permissions"
    exit 1
  fi

  echo "✅ Metrics sent to Coralogix"

  # Wait for metrics to be queryable via Prometheus API
  echo "⏳ Waiting for metrics to be queryable via PromQL..."
  METRICS_URL="https://api.eu2.coralogix.com/metrics/api/v1/query"

  METRICS_READY=false
  for i in {1..120}; do
    # Query for the metric via PromQL
    RESULT=$(curl -sk --max-time 60 -X GET \
      "${METRICS_URL}?query=${METRIC_PREFIX}_http_errors_total" \
      -H "Authorization: Bearer ${CORALOGIX_API_KEY}" 2>/dev/null || true)

    if [ "$i" -eq 1 ] || [ "$((i % 10))" -eq 0 ]; then
      echo "   Debug query response (attempt $i, ${#RESULT} bytes): ${RESULT:0:500}"
    fi

    # Check if we got metric data back (status: success and result has data)
    if echo "$RESULT" | grep -q '"status":"success"' && echo "$RESULT" | grep -q "${METRIC_PREFIX}_http_errors_total"; then
      echo "✅ Metrics are queryable after $((i * 5)) seconds"
      METRICS_READY=true
      break
    fi

    echo "   Attempt $i/120: Metrics not yet indexed, waiting 5s..."
    sleep 5
  done

  if [ "$METRICS_READY" = false ]; then
    echo "❌ Timeout waiting for metrics to be queryable"
    echo "   This could mean:"
    echo "   - CORALOGIX_API_KEY doesn't have DataQuerying permissions"
    echo "   - Metrics were sent to a different Coralogix team than the query key"
    echo "   - Coralogix indexing is experiencing delays"
    exit 1
  fi

  echo "✅ Test setup complete! Metric prefix: ${METRIC_PREFIX}"

after_test: |
  # No cleanup needed - metrics will naturally age out of Coralogix
  # The metric prefix includes EVAL_RUN_ID so it's unique to this test run
  echo "✅ Cleanup complete (metrics will age out naturally)"
