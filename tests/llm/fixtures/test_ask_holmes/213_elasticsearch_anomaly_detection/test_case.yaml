# Test: Elasticsearch Statistical Anomaly Detection in Noisy Data
#
# This test creates latency measurements for 5 services with natural noise.
# Four services have similar distributions. One service (echo) has 10 hidden
# outlier data points (~450ms) mixed into otherwise normal data. The outliers
# share a unique batch ID marker.
#
# The LLM must:
# 1. Use aggregation queries (percentiles or extended_stats) across services
# 2. Compare distributions - means are similar, but p99 diverges for echo
# 3. Identify service-echo as anomalous based on p99 or max latency
# 4. Drill into the outlier records to find the batch ID marker
#
# Anti-hallucination: The specific batch ID ANOMALY-BATCH-Q7W3X and the
# anomalous service can only be found by querying with percentile aggregations.
#
# Requirements:
# - ELASTICSEARCH_URL: URL to Elasticsearch cluster
# - ELASTICSEARCH_API_KEY: API key for authentication

user_prompt: "We suspect one of our services has a latency anomaly hidden in the data. Examine the latency measurements in the app-213-latency index for all 5 services (service-alfa, service-bravo, service-charlie, service-delta-2, service-echo). Compare their latency distributions - look at p50, p90, p99, and max values, not just averages. Which service has a statistically unusual latency tail? Find the batch_id associated with the anomalous high-latency requests."

expected_output:
  - "Must identify service-echo as the anomalous service"
  - "Must report that service-echo's p99 or max latency is significantly higher than the others (approximately 440-460ms vs ~280-290ms for normal services)"
  - "Must find and report the batch ID ANOMALY-BATCH-Q7W3X associated with the outlier requests"

tags:
  - elasticsearch
  - hard
  - benchmark
  - fast

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  echo "Creating latency measurement index for anomaly detection test..."

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-213-latency" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  CREATE_RESPONSE=$(curl -sf -X PUT "${ELASTICSEARCH_URL}/app-213-latency" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "settings": {
        "number_of_shards": 1,
        "number_of_replicas": 0
      },
      "mappings": {
        "properties": {
          "@timestamp": {"type": "date"},
          "service": {"type": "keyword"},
          "latency_ms": {"type": "float"},
          "status_code": {"type": "integer"},
          "endpoint": {"type": "keyword"},
          "batch_id": {"type": "keyword"},
          "region": {"type": "keyword"}
        }
      }
    }')

  if ! echo "$CREATE_RESPONSE" | grep -q '"acknowledged":true'; then
    echo "Failed to create index: $CREATE_RESPONSE"
    exit 1
  fi

  echo "Generating latency data with hidden anomalies..."

  cat > /tmp/es_gen_213.py << 'PYSCRIPT'
  import json, random, math

  random.seed(12345)

  services = ["service-alfa", "service-bravo", "service-charlie", "service-delta-2", "service-echo"]
  endpoints = ["/api/users", "/api/orders", "/api/products", "/api/checkout", "/api/search"]
  regions = ["us-east", "us-west", "eu-west"]

  docs = []
  base_hour = 0

  for svc_idx, service in enumerate(services):
      for i in range(500):
          minute = i % 60
          hour = (base_hour + i // 60) % 24
          ts = f"2024-06-15T{hour:02d}:{minute:02d}:{random.randint(0,59):02d}Z"

          # Normal latency: mean=200, stddev=30
          latency = 200 + random.gauss(0, 30)

          # For service-echo: inject 10 outliers at specific positions
          batch_id = None
          if service == "service-echo" and i in [47, 123, 198, 256, 312, 367, 401, 438, 462, 489]:
              latency = 445 + random.gauss(0, 12)  # outlier: ~445ms
              batch_id = "ANOMALY-BATCH-Q7W3X"

          latency = round(max(latency, 10), 1)

          doc = {
              "@timestamp": ts,
              "service": service,
              "latency_ms": latency,
              "status_code": 200 if latency < 350 else 500,
              "endpoint": endpoints[i % len(endpoints)],
              "region": regions[i % len(regions)]
          }
          if batch_id:
              doc["batch_id"] = batch_id

          docs.append(doc)

  # Write NDJSON
  with open("/tmp/es_anomaly_213.ndjson", "w") as f:
      for doc in docs:
          f.write(json.dumps({"index": {"_index": "app-213-latency"}}) + "\n")
          f.write(json.dumps(doc) + "\n")

  print(f"Generated {len(docs)} latency measurements across {len(services)} services")

  # Show distribution summary
  for svc in services:
      svc_docs = [d for d in docs if d["service"] == svc]
      lats = sorted([d["latency_ms"] for d in svc_docs])
      p50 = lats[len(lats)//2]
      p99 = lats[int(len(lats)*0.99)]
      print(f"  {svc}: mean={sum(lats)/len(lats):.1f}, p50={p50:.1f}, p99={p99:.1f}, max={max(lats):.1f}")
  PYSCRIPT
  python3 /tmp/es_gen_213.py
  rm -f /tmp/es_gen_213.py

  DOC_COUNT=$(grep -c '"index"' /tmp/es_anomaly_213.ndjson)
  echo "Bulk file has $DOC_COUNT documents"

  RESPONSE=$(curl -sf -X POST "${ELASTICSEARCH_URL}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"/tmp/es_anomaly_213.ndjson")

  if echo "$RESPONSE" | grep -q '"errors":true'; then
    echo "Errors during bulk insert"
    exit 1
  fi

  rm -f /tmp/es_anomaly_213.ndjson

  curl -sf -X POST "${ELASTICSEARCH_URL}/app-213-latency/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  sleep 2

  # Verify
  TOTAL=$(curl -sf -X POST "${ELASTICSEARCH_URL}/app-213-latency/_count" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"query": {"match_all": {}}}' | python3 -c "import sys,json; print(json.load(sys.stdin)['count'])")
  echo "Total documents: $TOTAL"

  OUTLIERS=$(curl -sf -X POST "${ELASTICSEARCH_URL}/app-213-latency/_count" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"query": {"term": {"batch_id": "ANOMALY-BATCH-Q7W3X"}}}' | python3 -c "import sys,json; print(json.load(sys.stdin)['count'])")
  echo "Outlier documents with batch_id: $OUTLIERS"

  if [ "$TOTAL" -ne 2500 ]; then
    echo "Expected 2500 documents, got $TOTAL"
    exit 1
  fi

  if [ "$OUTLIERS" -ne 10 ]; then
    echo "Expected 10 outlier documents, got $OUTLIERS"
    exit 1
  fi

  echo "Setup complete!"

after_test: |
  echo "Cleaning up test index..."
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-213-latency" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  rm -f /tmp/es_anomaly_213*.ndjson
  echo "Cleanup complete"
