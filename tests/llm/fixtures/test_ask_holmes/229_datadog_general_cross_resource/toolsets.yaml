toolsets:
  # Disable K8s-dependent defaults (no cluster needed for this cloud-only test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
  bash:
    enabled: false

  datadog/general:
    enabled: true
    config:
      api_key: "{{env.DATADOG_API_KEY}}"
      app_key: "{{env.DATADOG_APP_KEY}}"
      api_url: "https://api.us5.datadoghq.com"
