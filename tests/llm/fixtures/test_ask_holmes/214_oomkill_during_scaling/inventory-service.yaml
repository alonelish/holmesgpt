apiVersion: v1
kind: Secret
metadata:
  name: inventory-app
  namespace: app-214
type: Opaque
stringData:
  app.sh: |
    #!/bin/sh
    echo "Starting inventory service..."
    # Allocate memory that will exceed the 32Mi limit
    # dd reads from /dev/urandom into memory via a variable
    # This will trigger OOMKill
    while true; do
      # Each iteration allocates ~20MB, will OOM on 2nd iteration
      DATA=$(dd if=/dev/urandom bs=1M count=20 2>/dev/null | base64)
      echo "Loaded batch into memory (size: ${#DATA} bytes)"
      sleep 2
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: app-214
  labels:
    app: inventory-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: busybox:1.36
        command: ["/bin/sh", "/app/app.sh"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-code
          mountPath: /app
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "100m"
      volumes:
      - name: app-code
        secret:
          secretName: inventory-app
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: app-214
  labels:
    app: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
  - port: 80
    targetPort: 8080
    name: http
