# V1: Stable version that runs fine within memory limits
apiVersion: v1
kind: Secret
metadata:
  name: inventory-app-v1
  namespace: app-214
type: Opaque
stringData:
  run.sh: |
    #!/bin/sh
    echo "[inventory-service v1.3.2] Starting..."
    echo "[inventory-service] Connected to inventory-db:5432"
    echo "[inventory-service] Cache warmed: 1247 SKUs loaded"
    while true; do
      echo "[inventory-service] INFO: processed inventory check in 23ms"
      sleep 5
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: app-214
  labels:
    app: inventory-service
  annotations:
    kubernetes.io/change-cause: "deploy v1.3.2 - stable release"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inventory-service
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: inventory-service
        version: v1
    spec:
      containers:
      - name: inventory-service
        image: busybox:1.36
        command: ["/bin/sh", "/app/run.sh"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-code
          mountPath: /app
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: app-code
        secret:
          secretName: inventory-app-v1
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: app-214
  labels:
    app: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
  - port: 80
    targetPort: 8080
    name: http
