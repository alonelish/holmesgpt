# Supporting services for inventory-service — healthy, add noise
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-db
  namespace: app-214
  labels:
    app: inventory-db
    tier: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-db
  template:
    metadata:
      labels:
        app: inventory-db
        tier: infra
    spec:
      containers:
      - name: postgres
        image: registry.k8s.io/pause:3.9
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-db
  namespace: app-214
  labels:
    app: inventory-db
    tier: infra
spec:
  selector:
    app: inventory-db
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-search
  namespace: app-214
  labels:
    app: product-search
    tier: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-search
  template:
    metadata:
      labels:
        app: product-search
        tier: infra
    spec:
      containers:
      - name: elasticsearch
        image: registry.k8s.io/pause:3.9
        ports:
        - containerPort: 9200
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: product-search
  namespace: app-214
  labels:
    app: product-search
    tier: infra
spec:
  selector:
    app: product-search
  ports:
  - port: 9200
    targetPort: 9200
