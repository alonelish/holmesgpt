user_prompt:
- "The inventory-service in namespace app-214 has high latency and some requests are failing. This started after a recent deployment. Please investigate."

expected_output:
  - Must identify that pods are being OOMKilled (exit code 137 or OOMKilled reason)
  - Must mention that the container memory limit is too low or that the new version is using too much memory
  - Should connect the OOMKill to the recent deployment or rollout of the new version

include_tool_calls: true

tags:
  - kubernetes
  - medium
  - chain-of-causation
  - regression

setup_timeout: 240

before_test: |
  set -e

  echo "📁 Creating namespace..."
  kubectl create namespace app-214 --dry-run=client -o yaml | kubectl apply -f -

  echo "🗄️ Deploying supporting services..."
  kubectl apply -f supporting-services.yaml -n app-214

  echo "🚀 Deploying inventory-service v1 (stable, low memory)..."
  kubectl apply -f inventory-service-v1.yaml -n app-214

  echo "⏳ Waiting for v1 pods to be ready..."
  PODS_READY=false
  for i in {1..60}; do
    if kubectl wait --for=condition=ready pod -l app=inventory-service -n app-214 --timeout=5s 2>/dev/null; then
      echo "✅ V1 pods are ready!"
      PODS_READY=true
      break
    fi
    sleep 1
  done
  if [ "$PODS_READY" = false ]; then
    echo "❌ V1 pods failed to become ready"
    kubectl get pods -n app-214
    exit 1
  fi

  echo "⏳ Waiting for supporting services..."
  for i in {1..30}; do
    if kubectl wait --for=condition=ready pod -l tier=infra -n app-214 --timeout=5s 2>/dev/null; then
      echo "✅ Supporting services are ready!"
      break
    fi
    sleep 1
  done

  echo "📊 Applying HPA..."
  kubectl apply -f hpa.yaml -n app-214

  echo "📈 Rolling out v2 (memory-hungry version)..."
  kubectl apply -f inventory-service-v2.yaml -n app-214

  echo "⏳ Waiting for OOMKill events on v2 pods..."
  OOMKILL_FOUND=false
  for i in {1..120}; do
    if kubectl get pods -n app-214 -l app=inventory-service -o jsonpath='{.items[*].status.containerStatuses[*].lastState.terminated.reason}' 2>/dev/null | grep -q "OOMKilled"; then
      echo "✅ OOMKill detected in pod status!"
      OOMKILL_FOUND=true
      break
    fi
    sleep 1
  done
  if [ "$OOMKILL_FOUND" = false ]; then
    echo "⚠️ No OOMKill detected yet, checking pod states..."
    kubectl get pods -n app-214 -o wide
    kubectl describe pods -n app-214 -l app=inventory-service | tail -30
  fi

  echo "📋 Final state:"
  kubectl get pods -n app-214
  kubectl get events -n app-214 --sort-by='.lastTimestamp' | tail -15
  kubectl rollout status deployment/inventory-service -n app-214 --timeout=5s || true

  echo "✅ Test setup completed"

after_test: |
  kubectl delete namespace app-214 || true
