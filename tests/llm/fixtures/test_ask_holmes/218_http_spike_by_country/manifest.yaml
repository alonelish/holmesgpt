apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: app-218
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
      - name: exporter
        image: python:3.11-slim
        command: ["python", "/app/metrics_exporter.py"]
        ports:
        - containerPort: 9100
        volumeMounts:
        - name: app-code
          mountPath: /app
        readinessProbe:
          httpGet: { path: /healthz, port: 9100 }
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          limits:
            memory: "64Mi"
            cpu: "100m"
          requests:
            memory: "32Mi"
            cpu: "50m"
      volumes:
      - name: app-code
        secret:
          secretName: api-gateway-exporter
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: app-218
  labels: { app: api-gateway }
spec:
  selector: { app: api-gateway }
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100
