user_prompt:
  - "An alert fired for HighRequestRate on the api-gateway service in namespace app-218. The alert says HTTP request rate exceeded 200 req/s. Investigate what is causing the spike and identify which segment of traffic is responsible."
  - "We received a HighRequestRate alert for the api-gateway in namespace app-218. Request rate went above 200/s. Use Prometheus to find out what changed and which traffic source caused the spike."

expected_output:
  - "Must identify that Brazil (BR) or country=BR is the source of the traffic spike"
  - "Must mention that the spike is a significant increase from the baseline (e.g., from ~12 req/s to ~300 req/s or similar order of magnitude increase for BR)"
  - "Must note that other countries (US, DE, JP, GB) remain at normal levels while BR spiked"

tags:
  - hard
  - chain-of-causation
  - prometheus
  - metrics

setup_timeout: 300

before_test: |
  set -e
  WORKDIR="/tmp/holmesgpt-eval-218"
  rm -rf "$WORKDIR"
  mkdir -p "$WORKDIR"

  # Start the metrics exporter (redirect to file so subprocess.run pipe closes)
  python3 ./metrics_exporter.py > "$WORKDIR/exporter.log" 2>&1 &
  EXPORTER_PID=$!
  echo "$EXPORTER_PID" > "$WORKDIR/exporter.pid"
  sleep 2

  # Verify exporter is running
  if ! kill -0 "$EXPORTER_PID" 2>/dev/null; then
    echo "❌ Metrics exporter failed to start"
    exit 1
  fi
  echo "✅ Metrics exporter running on :9218 (PID $EXPORTER_PID)"

  # Create Prometheus config for local scraping
  cat > "$WORKDIR/prometheus.yml" << 'PROMEOF'
  global:
    scrape_interval: 5s
    evaluation_interval: 5s
  rule_files:
    - alerts.yml
  scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /metrics
    static_configs:
    - targets: ['localhost:9218']
  PROMEOF

  cat > "$WORKDIR/alerts.yml" << 'ALERTEOF'
  groups:
  - name: api-gateway-alerts
    rules:
    - alert: HighRequestRate
      expr: sum(rate(http_requests_total[1m])) > 200
      for: 30s
      labels:
        severity: warning
        service: api-gateway
        namespace: app-218
      annotations:
        summary: "HTTP request rate exceeded 200 req/s"
  ALERTEOF

  # Start Prometheus
  /tmp/prometheus-bin/prometheus \
    --config.file="$WORKDIR/prometheus.yml" \
    --storage.tsdb.path="$WORKDIR/data" \
    --web.listen-address=":10218" \
    --log.level=warn > "$WORKDIR/prometheus.log" 2>&1 &
  PROM_PID=$!
  echo "$PROM_PID" > "$WORKDIR/prometheus.pid"
  sleep 3

  # Wait for Prometheus to be ready
  PROM_READY=false
  for i in {1..30}; do
    if curl -sf http://localhost:10218/-/ready >/dev/null 2>&1; then
      echo "✅ Prometheus ready on :10218 (PID $PROM_PID)"
      PROM_READY=true
      break
    fi
    sleep 1
  done
  if [ "$PROM_READY" = false ]; then
    echo "❌ Prometheus failed to start"
    exit 1
  fi

  # Wait for traffic pattern to develop (need ~20 scrapes for spike)
  echo "⏳ Waiting 120s for traffic pattern to develop in metrics..."
  sleep 120

  # Verify spike is visible
  RESULT=$(curl -sf "http://localhost:10218/api/v1/query?query=sum%20by%20(country)%20(rate(http_requests_total%5B30s%5D))" 2>/dev/null || echo "")
  if echo "$RESULT" | grep -q '"BR"'; then
    echo "✅ BR traffic data visible in Prometheus"
  else
    echo "⚠️ BR data may not be fully visible yet"
    echo "Query result: $RESULT"
  fi

after_test: |
  WORKDIR="/tmp/holmesgpt-eval-218"
  kill $(cat "$WORKDIR/exporter.pid" 2>/dev/null) 2>/dev/null || true
  kill $(cat "$WORKDIR/prometheus.pid" 2>/dev/null) 2>/dev/null || true
  rm -rf "$WORKDIR"
