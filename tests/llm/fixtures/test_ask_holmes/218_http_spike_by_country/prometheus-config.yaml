apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: app-218
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
    - job_name: 'api-gateway'
      metrics_path: /metrics
      static_configs:
      - targets: ['api-gateway.app-218.svc.cluster.local:9100']
  alerts.yml: |
    groups:
    - name: api-gateway-alerts
      rules:
      - alert: HighRequestRate
        expr: sum(rate(http_requests_total[1m])) > 200
        for: 30s
        labels:
          severity: warning
          service: api-gateway
          namespace: app-218
        annotations:
          summary: "HTTP request rate exceeded 200 req/s"
          description: "Total HTTP request rate is {{ $value }} req/s, exceeding threshold of 200 req/s."
