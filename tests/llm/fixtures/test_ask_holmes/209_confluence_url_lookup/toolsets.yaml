# Toolset configuration for Confluence URL lookup test
# Uses Bearer Auth (service account) - no username needed
toolsets:
  confluence:
    enabled: true
    config:
      url: "{{ env.CONFLUENCE_BASE_URL }}"
      api_key: "{{ env.CONFLUENCE_API_KEY }}"

  # Disable K8s-dependent toolsets (no K8s in this test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
  robusta:
    enabled: false
  connectivity_check:
    enabled: false
