# Toolset configuration for Confluence URL lookup test
# Uses the generic HTTP toolset instead of dedicated Confluence toolset
toolsets:
  http:
    enabled: true
    config:
      endpoints:
        - host: "*.atlassian.net"
          paths: ["/wiki/rest/api/*"]
          auth:
            type: basic
            username: "{{ env.CONFLUENCE_USER_NAME }}"
            password: "{{ env.CONFLUENCE_API_KEY }}"
          health_check_url: "https://robusta-llm-test.atlassian.net/wiki/rest/api/user/current"
  # Disable K8s-dependent toolsets (no K8s in this test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
