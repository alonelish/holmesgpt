# Toolset configuration for Confluence URL lookup test - Classic Auth
# Uses personal API token with basic auth on site-specific URL
#
# Auth: Basic auth (email:token) on https://{site}.atlassian.net
# For service account tokens, use the service account eval variant instead
toolsets:
  http:
    enabled: true
    config:
      endpoints:
        - host: "*.atlassian.net"
          paths: ["/wiki/rest/api/*"]
          auth:
            type: basic
            username: "{{ env.CONFLUENCE_USER_NAME }}"
            password: "{{ env.CONFLUENCE_API_KEY }}"
          # Health check disabled - classic tokens may not have content list permission
          # health_check_url: "https://robusta-llm-test.atlassian.net/wiki/rest/api/content?limit=1"
  # Disable K8s-dependent toolsets (no K8s in this test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
