# Toolset configuration for Notion page search test
toolsets:
  notion:
    enabled: true
    config:
      api_key: "{{ env.NOTION_API_KEY }}"
  # Disable K8s-dependent toolsets (no K8s in this test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
