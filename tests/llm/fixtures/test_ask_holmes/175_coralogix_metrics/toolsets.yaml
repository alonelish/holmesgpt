# Coralogix metrics toolset configuration for test 175
# Uses Prometheus RemoteWrite to send, Prometheus-compatible API to query
#
# Coralogix exposes a PromQL-compatible query endpoint:
# https://api.<domain>/metrics/api/v1/query
#
# See: https://coralogix.com/docs/user-guides/data-query/metrics-api/

toolsets:
  prometheus/metrics:
    enabled: true
    config:
      prometheus_url: "https://api.eu2.coralogix.com/metrics"
      headers:
        Authorization: "Bearer {{env.CORALOGIX_API_KEY}}"
      verify_ssl: false

  # Disable toolsets that require local infrastructure (cloud-only test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
