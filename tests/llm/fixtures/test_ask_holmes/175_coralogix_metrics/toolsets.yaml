# Coralogix metrics toolset configuration for test 175
# Uses the Prometheus-compatible API for querying metrics
# Cloud-only test - no Kubernetes required

toolsets:
  prometheus/metrics:
    enabled: true
    config:
      prometheus_url: "https://ng-api-http.{{env.CORALOGIX_DOMAIN}}/metrics"
      headers:
        Authorization: "Bearer {{env.CORALOGIX_API_KEY}}"
