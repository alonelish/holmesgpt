# Test: Coralogix Trace Search with DataPrime
# Tests that Holmes can search traces using Coralogix DataPrime query language
#
# This is a fast cloud-only test that sends traces via OTLP gRPC to Coralogix,
# no Kubernetes cluster required.
#
# Requirements:
# - CORALOGIX_SEND_API_KEY: API key with SendData permissions (for ingestion)
# - CORALOGIX_API_KEY: API key with DataQuerying permissions (for queries)
# - OpenTelemetry Python packages (installed via poetry)
#
# Note: Coralogix uses separate API keys for sending vs querying data.
# See: https://coralogix.com/docs/user-guides/account-management/api-keys/api-keys/
#
# Anti-hallucination: The test injects a specific error code (ERR-XXXX format)
# and trace ID that the LLM can only find by actually querying Coralogix.

user_prompt: "Search the Coralogix traces for the 'checkout-flow-8m2n' application. Look for failed spans and report what error codes you find. Also identify which operation failed."

expected_output:
  - "Must identify that there are error/failed spans"
  - "Must find the error code ERR-5847"
  - "Must mention that the external_api_call or payment gateway operation failed"

tags:
  - coralogix
  - traces
  - medium

setup_timeout: 300

before_test: |
  set -e
  source ../../shared/coralogix/coralogix_test_utils.sh
  cx_setup

  echo "🚀 Setting up Coralogix traces test 174"

  APP_NAME="checkout-flow-8m2n"
  SUBSYSTEM="checkout-service"
  TRACE_ID="TRACE-174-$(date +%s)"
  ERROR_CODE="ERR-5847"

  echo "⏳ Sending traces to Coralogix via OTLP..."

  # Send traces using Python OTLP exporter
  python3 ../../shared/coralogix/send_traces.py \
    --app-name "$APP_NAME" \
    --subsystem "$SUBSYSTEM" \
    --trace-id "$TRACE_ID" \
    --error-code "$ERROR_CODE"

  if [ $? -ne 0 ]; then
    echo "❌ Failed to send traces"
    exit 1
  fi

  echo "✅ Traces sent to $APP_NAME/$SUBSYSTEM"

  # Wait for traces to be queryable
  echo "⏳ Waiting for traces to be queryable in Coralogix..."
  QUERY_URL=$(cx_query_url)

  # Calculate time range for query (1 hour ago to now)
  START_DATE=$(date -u -d '1 hour ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-1H '+%Y-%m-%dT%H:%M:%SZ')
  END_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
  echo "   Query time range: $START_DATE to $END_DATE"

  TRACES_READY=false
  for i in {1..60}; do
    # Use || true to prevent set -e from exiting on curl failure
    # Use -k to skip SSL verification (for sandbox environments with TLS interception)
    # Use filter for applicationname (label field) + lucene for text search
    # Build JSON with jq for proper escaping of $l.applicationname
    JSON_PAYLOAD=$(jq -n \
      --arg query "source spans | filter \$l.applicationname == '$APP_NAME' | lucene '$ERROR_CODE' | limit 1" \
      --arg start "$START_DATE" \
      --arg end "$END_DATE" \
      '{query: $query, metadata: {syntax: "QUERY_SYNTAX_DATAPRIME", startDate: $start, endDate: $end}}')
    RESULT=$(curl -sk -X POST "$QUERY_URL" \
      -H "Authorization: Bearer ${CORALOGIX_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "$JSON_PAYLOAD" 2>/dev/null || true)

    # Debug: print response periodically
    if [ "$i" -eq 1 ] || [ "$((i % 10))" -eq 0 ]; then
      echo "   Debug query response (attempt $i): $RESULT"
    fi

    if echo "$RESULT" | grep -q "$ERROR_CODE"; then
      echo "✅ Traces are queryable after $((i * 5)) seconds"
      TRACES_READY=true
      break
    fi

    echo "   Attempt $i/60: Traces not yet indexed, waiting 5s..."
    sleep 5
  done

  if [ "$TRACES_READY" = false ]; then
    echo "❌ Timeout waiting for traces to be queryable"
    exit 1
  fi

  echo "✅ Test setup complete!"

after_test: |
  # No cleanup needed - traces will naturally age out of Coralogix
  echo "✅ Cleanup complete (traces will age out naturally)"
