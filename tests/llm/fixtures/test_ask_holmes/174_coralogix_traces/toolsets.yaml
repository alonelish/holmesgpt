# Coralogix toolset configuration for test 174
# Cloud-only test - no Kubernetes required

toolsets:
  coralogix:
    enabled: true
    config:
      api_key: "{{env.CORALOGIX_API_KEY}}"
      domain: "{{env.CORALOGIX_DOMAIN}}"
      # team_hostname is optional - only needed for clickable UI permalink URLs
