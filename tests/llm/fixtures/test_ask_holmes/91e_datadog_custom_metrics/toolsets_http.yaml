toolsets:
  kubernetes/core:
    enabled: true
  datadog-metrics-api:
    type: http
    enabled: true
    config:
      endpoints:
        - hosts: ["api.us5.datadoghq.com"]
          paths: ["/api/v1/*", "/api/v2/*"]
          methods: ["GET"]
          auth:
            type: header
            name: "DD-API-KEY"
            value: "{{env.DATADOG_API_KEY}}"
      default_headers:
        DD-APPLICATION-KEY: "{{env.DATADOG_APP_KEY}}"
      timeout_seconds: 30
    llm_instructions: |
      ### Datadog Metrics REST API

      Base URL: https://api.us5.datadoghq.com

      Available endpoints:
      - GET /api/v1/metrics?from={unix_epoch_seconds} - List active metrics (from is required, unix epoch seconds)
      - GET /api/v1/query?query={dd_query}&from={unix_epoch_seconds}&to={unix_epoch_seconds} - Query timeseries data
      - GET /api/v1/metrics/{metric_name} - Get metric metadata (type, unit, description)
      - GET /api/v2/metrics/{metric_name}/active-configurations - List available tags and aggregations for a metric

      Time parameters use unix epoch seconds (e.g. 1700000000). Calculate relative to current time.

      Query syntax: "metric_name{tag1:value1,tag2:value2}"
      Example: "container.cpu.usage{pod_name:my-pod-abc123,kube_namespace:my-ns}"
      Common tags: pod_name, kube_namespace, host, kube_deployment
