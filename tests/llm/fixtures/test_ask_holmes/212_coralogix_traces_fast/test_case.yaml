# Test: Coralogix Trace/Span Search with DataPrime
# Tests that Holmes can search spans using Coralogix DataPrime query language
#
# This test sends traces via OTLP HTTP to Coralogix and queries via DataPrime.
#
# Requirements:
# - CORALOGIX_SEND_API_KEY: API key with SendData permissions (for ingestion)
# - CORALOGIX_API_KEY: API key with DataQuerying permissions (for queries)
#
# Anti-hallucination: Uses unique EVAL_RUN_ID in service name to prevent
# tests from succeeding on cached data from previous runs.

user_prompt: "Search the Coralogix spans for the 'checkout-flow-{{ env.EVAL_RUN_ID }}' service. Look for failed spans and report what error codes you find. Also identify which operation failed."

expected_output:
  - "Must identify that there are error/failed spans"
  - "Must find the error code ERR-5847"
  - "Must mention that the external_api_call or payment gateway operation failed"

tags:
  - coralogix
  - traces
  - medium

setup_timeout: 900

before_test: |
  set -e
  source ../../shared/coralogix/coralogix_test_utils.sh
  cx_setup

  echo "🚀 Setting up Coralogix traces test 212 (run_id: ${EVAL_RUN_ID})"

  # Use EVAL_RUN_ID in service name to ensure uniqueness per test run
  APP_NAME="checkout-flow-${EVAL_RUN_ID}"
  SUBSYSTEM="checkout-service"
  TRACE_ID="TRACE-212-$(date +%s)"
  ERROR_CODE="ERR-5847"

  echo "⏳ Sending traces to Coralogix via OTLP HTTP for service: $APP_NAME..."

  # Send traces using Python OTLP HTTP exporter
  # The script will fail with non-zero exit code if OTLP export fails
  SSL_VERIFY=false python3 ../../shared/coralogix/send_traces.py \
    --app-name "$APP_NAME" \
    --subsystem "$SUBSYSTEM" \
    --trace-id "$TRACE_ID" \
    --error-code "$ERROR_CODE"

  if [ $? -ne 0 ]; then
    echo "❌ Failed to send traces"
    echo "   This usually means CORALOGIX_SEND_API_KEY is invalid or has wrong permissions"
    exit 1
  fi

  echo "✅ Traces sent to $APP_NAME/$SUBSYSTEM"

  # Wait for spans to be queryable
  echo "⏳ Waiting for spans to be queryable in Coralogix..."
  QUERY_URL=$(cx_query_url)

  START_DATE=$(date -u -d '1 hour ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-1H '+%Y-%m-%dT%H:%M:%SZ')
  END_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

  SPANS_READY=false
  for i in {1..180}; do
    # Query spans source for the error code
    # Note: lucene 'ERR-5847' works for spans (full-text search on all fields)
    JSON_PAYLOAD=$(jq -n \
      --arg query "source spans | lucene '$ERROR_CODE' | limit 10" \
      --arg start "$START_DATE" \
      --arg end "$END_DATE" \
      '{query: $query, metadata: {syntax: "QUERY_SYNTAX_DATAPRIME", startDate: $start, endDate: $end}}')
    RESULT=$(curl -sk --max-time 60 -X POST "$QUERY_URL" \
      -H "Authorization: Bearer ${CORALOGIX_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "$JSON_PAYLOAD" 2>/dev/null || true)

    if [ "$i" -eq 1 ] || [ "$((i % 10))" -eq 0 ]; then
      echo "   Debug query response (attempt $i, ${#RESULT} bytes): ${RESULT:0:500}"
    fi

    if echo "$RESULT" | grep -q "$ERROR_CODE"; then
      echo "✅ Spans are queryable after $((i * 5)) seconds"
      SPANS_READY=true
      break
    fi

    echo "   Attempt $i/180: Spans not yet indexed, waiting 5s..."
    sleep 5
  done

  if [ "$SPANS_READY" = false ]; then
    echo "❌ Timeout waiting for spans to be queryable"
    echo "   This could mean:"
    echo "   - CORALOGIX_API_KEY doesn't have DataQuerying permissions"
    echo "   - Traces were sent to a different Coralogix team than the query key"
    echo "   - Coralogix indexing is experiencing delays"
    exit 1
  fi

  echo "✅ Test setup complete! Service: $APP_NAME"

after_test: |
  # No cleanup needed - spans will naturally age out of Coralogix
  # The service name includes EVAL_RUN_ID so it's unique to this test run
  echo "✅ Cleanup complete (spans will age out naturally)"
