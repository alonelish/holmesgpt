# Toolset configuration for Confluence page fetch test
# This is a cloud-only test, no Kubernetes required
# This test uses Bearer Auth (service account tokens) by default
# To use Basic Auth (personal tokens), add: username: "{{ env.CONFLUENCE_USERNAME }}"
toolsets:
  confluence:
    enabled: true
    config:
      url: "{{ env.CONFLUENCE_BASE_URL }}"
      api_key: "{{ env.CONFLUENCE_API_KEY }}"
      # No username = Bearer Auth for service accounts

  # Disable K8s-dependent toolsets (not needed for this test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
  robusta:
    enabled: false
  connectivity_check:
    enabled: false
