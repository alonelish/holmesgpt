user_prompt: |
  Find and fetch the contents of the test page titled "HolmesGPT Eval Test Page" in Confluence.
  Tell me the verification code found in the page content.

expected_output:
  - "Must report the verification code: HOLMES-EVAL-7x9k2m4p"

tags:
  - confluence
  - question-answer
  - medium

setup_timeout: 120

# Required env vars:
#   CONFLUENCE_USERNAME - Email for Atlassian Cloud (for Basic Auth)
#   CONFLUENCE_API_KEY - Atlassian API token
#   CONFLUENCE_BASE_URL - e.g., https://robusta-llm-test.atlassian.net
#   CONFLUENCE_SPACE_KEY - e.g., MFS

before_test: |
  set -e

  # Validate required environment variables
  if [ -z "$CONFLUENCE_USERNAME" ]; then
    echo "❌ CONFLUENCE_USERNAME environment variable is not set"
    exit 1
  fi
  if [ -z "$CONFLUENCE_API_KEY" ]; then
    echo "❌ CONFLUENCE_API_KEY environment variable is not set"
    exit 1
  fi
  if [ -z "$CONFLUENCE_BASE_URL" ]; then
    echo "❌ CONFLUENCE_BASE_URL environment variable is not set"
    exit 1
  fi
  if [ -z "$CONFLUENCE_SPACE_KEY" ]; then
    echo "❌ CONFLUENCE_SPACE_KEY environment variable is not set"
    exit 1
  fi

  echo "⏳ Creating test page in Confluence..."
  echo "   Base URL: $CONFLUENCE_BASE_URL"
  echo "   Space: $CONFLUENCE_SPACE_KEY"

  # Auto-discover cloud_id for Atlassian Cloud API gateway
  CLOUD_ID=$(curl -sf "${CONFLUENCE_BASE_URL}/_edge/tenant_info" | grep -o '"cloudId":"[^"]*"' | cut -d'"' -f4)
  if [ -z "$CLOUD_ID" ]; then
    echo "❌ Failed to discover cloud_id from ${CONFLUENCE_BASE_URL}/_edge/tenant_info"
    exit 1
  fi
  API_GATEWAY_URL="https://api.atlassian.com/ex/confluence/${CLOUD_ID}"
  echo "   Cloud ID: $CLOUD_ID"
  echo "   API Gateway: $API_GATEWAY_URL"

  # Use a fixed verification code that is included in expected_output
  # The LLM cannot see expected_output, so this is safe from cheating
  VERIFICATION_CODE="HOLMES-EVAL-7x9k2m4p"
  PAGE_TITLE="HolmesGPT Eval Test Page"

  # Create the page using Confluence REST API via API Gateway (Basic Auth)
  RESPONSE=$(curl -sf -X POST \
    -u "${CONFLUENCE_USERNAME}:${CONFLUENCE_API_KEY}" \
    -H "Content-Type: application/json" \
    "${API_GATEWAY_URL}/wiki/rest/api/content" \
    -d "{
      \"type\": \"page\",
      \"title\": \"${PAGE_TITLE}\",
      \"space\": {\"key\": \"${CONFLUENCE_SPACE_KEY}\"},
      \"body\": {
        \"storage\": {
          \"value\": \"<p>This is an automated test page for HolmesGPT evaluation.</p><p>Verification Code: <strong>${VERIFICATION_CODE}</strong></p><p>This page will be automatically cleaned up after the test.</p>\",
          \"representation\": \"storage\"
        }
      }
    }")

  if [ $? -ne 0 ]; then
    echo "❌ Failed to create Confluence page"
    echo "Response: $RESPONSE"
    exit 1
  fi

  # Extract the page ID from the response
  PAGE_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

  if [ -z "$PAGE_ID" ]; then
    echo "❌ Failed to extract page ID from response"
    echo "Response: $RESPONSE"
    exit 1
  fi

  # Save the page ID and cloud_id for cleanup
  echo "$PAGE_ID" > /tmp/confluence_test_page_id
  echo "$CLOUD_ID" > /tmp/confluence_test_cloud_id

  echo "✅ Created Confluence page with ID: $PAGE_ID"
  echo "✅ Page title: $PAGE_TITLE"

after_test: |
  set -e

  echo "⏳ Cleaning up test page..."

  if [ -f /tmp/confluence_test_page_id ] && [ -f /tmp/confluence_test_cloud_id ]; then
    PAGE_ID=$(cat /tmp/confluence_test_page_id)
    CLOUD_ID=$(cat /tmp/confluence_test_cloud_id)
    API_GATEWAY_URL="https://api.atlassian.com/ex/confluence/${CLOUD_ID}"

    if [ -n "$PAGE_ID" ] && [ -n "$CLOUD_ID" ]; then
      curl -sf -X DELETE \
        -u "${CONFLUENCE_USERNAME}:${CONFLUENCE_API_KEY}" \
        "${API_GATEWAY_URL}/wiki/rest/api/content/${PAGE_ID}" 2>&1 || true

      echo "✅ Deleted Confluence page with ID: $PAGE_ID"
    fi

    rm -f /tmp/confluence_test_page_id /tmp/confluence_test_cloud_id
  else
    echo "⚠️ No page ID or cloud_id file found, skipping cleanup"
  fi
