user_prompt: |
  A test page was created in Confluence. The page ID is stored in the file /tmp/confluence_test_page_id.
  First, read the file /tmp/confluence_test_page_id using the head command to get the page ID.
  Then, use the Confluence tool to fetch that page's contents.
  Tell me the unique verification code found in the page content.

expected_output:
  - "Must call the head or run_bash_command tool to read the page ID from /tmp/confluence_test_page_id"
  - "Must call the fetch_confluence_url tool with the page ID"
  - "Must report the unique verification code from the page content"

include_tool_calls: true

tags:
  - confluence
  - question-answer
  - medium

setup_timeout: 120

before_test: |
  set -e

  # Validate required environment variables
  if [ -z "$CONFLUENCE_BASE_URL" ]; then
    echo "❌ CONFLUENCE_BASE_URL environment variable is not set"
    exit 1
  fi
  if [ -z "$CONFLUENCE_USER" ]; then
    echo "❌ CONFLUENCE_USER environment variable is not set"
    exit 1
  fi
  if [ -z "$CONFLUENCE_API_KEY" ]; then
    echo "❌ CONFLUENCE_API_KEY environment variable is not set"
    exit 1
  fi
  if [ -z "$CONFLUENCE_SPACE_KEY" ]; then
    echo "❌ CONFLUENCE_SPACE_KEY environment variable is not set"
    exit 1
  fi

  echo "⏳ Creating test page in Confluence..."

  # Generate a unique verification code that LLM cannot guess
  VERIFICATION_CODE="HOLMES-TEST-$(date +%s)-$(head -c 8 /dev/urandom | xxd -p)"

  # Create page title with timestamp for uniqueness
  PAGE_TITLE="HolmesGPT Test Page $(date +%Y%m%d%H%M%S)"

  # Create the page using Confluence REST API
  RESPONSE=$(curl -sf -X POST \
    -u "${CONFLUENCE_USER}:${CONFLUENCE_API_KEY}" \
    -H "Content-Type: application/json" \
    "${CONFLUENCE_BASE_URL}/wiki/rest/api/content" \
    -d "{
      \"type\": \"page\",
      \"title\": \"${PAGE_TITLE}\",
      \"space\": {\"key\": \"${CONFLUENCE_SPACE_KEY}\"},
      \"body\": {
        \"storage\": {
          \"value\": \"<p>This is a test page created by HolmesGPT evaluation.</p><p>Verification Code: <strong>${VERIFICATION_CODE}</strong></p><p>Do not delete this page manually - it will be cleaned up automatically.</p>\",
          \"representation\": \"storage\"
        }
      }
    }")

  if [ $? -ne 0 ]; then
    echo "❌ Failed to create Confluence page"
    echo "Response: $RESPONSE"
    exit 1
  fi

  # Extract the page ID from the response
  PAGE_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

  if [ -z "$PAGE_ID" ]; then
    echo "❌ Failed to extract page ID from response"
    echo "Response: $RESPONSE"
    exit 1
  fi

  # Save the page ID to a file for the test to use
  echo "$PAGE_ID" > /tmp/confluence_test_page_id

  # Save the verification code to a file for after_test validation
  echo "$VERIFICATION_CODE" > /tmp/confluence_test_verification_code

  echo "✅ Created Confluence page with ID: $PAGE_ID"
  echo "✅ Verification code: $VERIFICATION_CODE"
  echo "✅ Page ID saved to /tmp/confluence_test_page_id"

after_test: |
  set -e

  echo "⏳ Cleaning up test page..."

  # Read the page ID from the file
  if [ -f /tmp/confluence_test_page_id ]; then
    PAGE_ID=$(cat /tmp/confluence_test_page_id)

    if [ -n "$PAGE_ID" ]; then
      # Delete the page using Confluence REST API
      DELETE_RESPONSE=$(curl -sf -X DELETE \
        -u "${CONFLUENCE_USER}:${CONFLUENCE_API_KEY}" \
        "${CONFLUENCE_BASE_URL}/wiki/rest/api/content/${PAGE_ID}" 2>&1 || true)

      echo "✅ Deleted Confluence page with ID: $PAGE_ID"
    fi

    # Clean up temp files
    rm -f /tmp/confluence_test_page_id
    rm -f /tmp/confluence_test_verification_code
  else
    echo "⚠️ No page ID file found, skipping cleanup"
  fi
