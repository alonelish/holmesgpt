# Traffic generator that hammers order-gateway to drive CPU utilization up
# This triggers HPA scale-up which then hits the ResourceQuota
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-gen
  namespace: app-212
  labels:
    app: traffic-gen
spec:
  replicas: 3
  selector:
    matchLabels:
      app: traffic-gen
  template:
    metadata:
      labels:
        app: traffic-gen
    spec:
      containers:
      - name: traffic-gen
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
        - |
          while true; do
            wget -q -O /dev/null --post-data='{"item":"widget","qty":1}' \
              --header='Content-Type: application/json' \
              http://order-gateway.app-212.svc.cluster.local/order 2>/dev/null || true
          done
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
