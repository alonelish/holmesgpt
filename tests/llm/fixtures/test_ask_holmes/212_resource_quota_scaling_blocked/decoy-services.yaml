      labels:
        app: order-db
        tier: backend
    spec:
      containers:
      - name: postgres
        image: registry.k8s.io/pause:3.9
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
