# Decoy services that consume quota and add noise to kubectl get pods output
# These are healthy and running fine — red herrings for investigation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-cache
  namespace: app-212
  labels:
    app: session-cache
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-cache
  template:
    metadata:
      labels:
        app: session-cache
        tier: backend
    spec:
      containers:
      - name: redis
        image: registry.k8s.io/pause:3.9
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: session-cache
  namespace: app-212
  labels:
    app: session-cache
    tier: backend
spec:
  selector:
    app: session-cache
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: app-212
  labels:
    app: order-db
    tier: backend
spec:
  replicas: 1
