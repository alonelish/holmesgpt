apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-gateway-hpa
  namespace: app-212
  labels:
    app: order-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
