user_prompt:
- "Users are reporting high latency on the order-gateway service in namespace app-212. Response times have gone from under 100ms to over 5 seconds. Please investigate."

expected_output:
  - Must identify that the HPA or deployment wants more replicas than currently running (desired > current)
  - Must identify that new pods cannot be created due to ResourceQuota limits being exceeded
  - Should mention the quota name or the specific resource (cpu or memory) that is hitting the limit

include_tool_calls: true

tags:
  - kubernetes
  - medium
  - chain-of-causation
  - regression

setup_timeout: 300

before_test: |
  set -e

  echo "📁 Creating namespace..."
  kubectl create namespace app-212 --dry-run=client -o yaml | kubectl apply -f -

  echo "🔒 Applying ResourceQuota (tight limits)..."
  kubectl apply -f resource-quota.yaml -n app-212

  echo "🗄️ Deploying decoy services (redis cache + postgres)..."
  kubectl apply -f decoy-services.yaml -n app-212

  echo "🚀 Deploying order-gateway service..."
  kubectl apply -f order-gateway.yaml -n app-212

  echo "⏳ Waiting for order-gateway pods to be ready..."
  PODS_READY=false
  for i in {1..60}; do
    if kubectl wait --for=condition=ready pod -l app=order-gateway -n app-212 --timeout=5s 2>/dev/null; then
      echo "✅ Pods are ready!"
      PODS_READY=true
      break
    fi
    sleep 1
  done
  if [ "$PODS_READY" = false ]; then
    echo "❌ Pods failed to become ready"
    kubectl get pods -n app-212
    exit 1
  fi

  echo "⏳ Waiting for decoy pods to be ready..."
  for i in {1..30}; do
    if kubectl wait --for=condition=ready pod -l tier=backend -n app-212 --timeout=5s 2>/dev/null; then
      echo "✅ Decoy pods are ready!"
      break
    fi
    sleep 1
  done

  echo "📊 Applying HPA..."
  kubectl apply -f hpa.yaml -n app-212

  echo "🚦 Deploying traffic generator to drive CPU up..."
  kubectl apply -f traffic-generator.yaml -n app-212

  echo "⏳ Waiting for traffic generator to start..."
  for i in {1..30}; do
    if kubectl get pods -n app-212 -l app=traffic-gen --no-headers 2>/dev/null | grep -q "Running"; then
      echo "✅ Traffic generator running!"
      break
    fi
    sleep 1
  done

  echo "⏳ Waiting for HPA to attempt scale-up and hit quota..."
  QUOTA_HIT=false
  for i in {1..30}; do
    # Check if ReplicaSet has FailedCreate events from quota
    if kubectl get events -n app-212 --field-selector reason=FailedCreate 2>/dev/null | grep -q "exceeded quota"; then
      echo "✅ Quota exceeded events detected!"
      QUOTA_HIT=true
      break
    fi
    # Also check HPA desired vs current
    DESIRED=$(kubectl get hpa order-gateway-hpa -n app-212 -o jsonpath='{.status.desiredReplicas}' 2>/dev/null || echo "0")
    CURRENT=$(kubectl get hpa order-gateway-hpa -n app-212 -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "0")
    echo "⏳ HPA: desired=$DESIRED current=$CURRENT (attempt $i/30)"
    sleep 2
  done
  if [ "$QUOTA_HIT" = false ]; then
    echo "⚠️ Quota was not hit organically, forcing scale to ensure test state..."
    kubectl scale deployment/order-gateway --replicas=8 -n app-212
    FORCED_QUOTA=false
    for i in {1..30}; do
      if kubectl get events -n app-212 --field-selector reason=FailedCreate 2>/dev/null | grep -q "exceeded quota"; then
        echo "✅ Quota exceeded events detected after forced scale!"
        FORCED_QUOTA=true
        break
      fi
      sleep 1
    done
    if [ "$FORCED_QUOTA" = false ]; then
      echo "❌ Failed to trigger quota exceeded events"
      kubectl get events -n app-212 --sort-by='.lastTimestamp' | tail -10
      kubectl get resourcequota -n app-212
      exit 1
    fi
  fi

  echo "🧹 Cleaning up traffic generator..."
  kubectl delete -f traffic-generator.yaml -n app-212 --ignore-not-found=true

  echo "📋 Final state:"
  kubectl get pods -n app-212
  kubectl get hpa -n app-212
  kubectl get resourcequota -n app-212

  echo "✅ Test setup completed"

after_test: |
  kubectl delete namespace app-212 || true
