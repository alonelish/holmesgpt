# Real Flask app that serves HTTP and consumes CPU under load
apiVersion: v1
kind: Secret
metadata:
  name: order-gateway-app
  namespace: app-212
type: Opaque
stringData:
  app.py: |
    from flask import Flask, request, jsonify
    import time
    import random
    import hashlib

    app = Flask(__name__)

    @app.route('/health')
    def health():
        return 'ok'

    @app.route('/order', methods=['POST'])
    def process_order():
        # Simulate CPU-intensive order validation
        data = str(request.json or {})
        for _ in range(500):
            data = hashlib.sha256(data.encode()).hexdigest()
        time.sleep(random.uniform(0.05, 0.15))
        return jsonify({"status": "processed"})

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080, threaded=True)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-gateway
  namespace: app-212
  labels:
    app: order-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-gateway
  template:
    metadata:
      labels:
        app: order-gateway
    spec:
      containers:
      - name: order-gateway
        image: me-west1-docker.pkg.dev/robusta-development/development/python-flask-otel:2.2
        imagePullPolicy: IfNotPresent
        command: ["python", "/app/app.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-code
          mountPath: /app
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 5
      volumes:
      - name: app-code
        secret:
          secretName: order-gateway-app
---
apiVersion: v1
kind: Service
metadata:
  name: order-gateway
  namespace: app-212
  labels:
    app: order-gateway
spec:
  selector:
    app: order-gateway
  ports:
  - port: 80
    targetPort: 8080
    name: http
