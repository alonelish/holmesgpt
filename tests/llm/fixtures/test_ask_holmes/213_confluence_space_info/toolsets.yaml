toolsets:
  confluence-api:
    type: http
    enabled: true
    config:
      endpoints:
        - hosts:
            - "api.atlassian.com"
          paths: ["/ex/confluence/*/wiki/rest/api/*"]
          methods: ["GET"]
          auth:
            type: basic
            username: "{{ env.CONFLUENCE_SA_USER }}"
            password: "{{ env.CONFLUENCE_SA_API_KEY }}"
      verify_ssl: true
      timeout_seconds: 30
    llm_instructions: |
      ### Confluence REST API

      You can query Confluence using the REST API via the Atlassian gateway.

      The base URL is: {{ env.CONFLUENCE_SA_BASE_URL }}

      Common endpoints:
      - GET /wiki/rest/api/space/{spaceKey} - Get space information
      - GET /wiki/rest/api/content/{contentId} - Get page content
      - GET /wiki/rest/api/content/search?cql={query} - Search using CQL

  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
