user_prompt:
  - "An alert fired: LowNetworkTraffic - HTTP request rate for the payment-gateway service in namespace app-219 has dropped below 10 req/s. Investigate what happened."
  - "We got a LowNetworkTraffic alert for the payment-gateway in namespace app-219. The alert says HTTP requests dropped below 10/s. The pod seems healthy. Figure out what happened."

expected_output:
  - "Must explicitly identify that there was a sudden drop in traffic (not a gradual decline) - traffic went from approximately 100 req/s to 0 or near-zero"
  - "Must note that the service/pod itself appears healthy and running despite the traffic drop"
  - "Should suggest a possible cause such as deadlock, upstream failure, dependency issue, or the service being stuck - not a crash or restart"

tags:
  - hard
  - chain-of-causation
  - prometheus
  - metrics

setup_timeout: 300

before_test: |
  set -e
  WORKDIR="/tmp/holmesgpt-eval-219"
  rm -rf "$WORKDIR"
  mkdir -p "$WORKDIR"

  # Start the metrics exporter (redirect to file so subprocess.run pipe closes)
  python3 ./metrics_exporter.py > "$WORKDIR/exporter.log" 2>&1 &
  EXPORTER_PID=$!
  echo "$EXPORTER_PID" > "$WORKDIR/exporter.pid"
  sleep 2

  if ! kill -0 "$EXPORTER_PID" 2>/dev/null; then
    echo "❌ Metrics exporter failed to start"
    exit 1
  fi
  echo "✅ Metrics exporter running on :9219 (PID $EXPORTER_PID)"

  # Create Prometheus config
  cat > "$WORKDIR/prometheus.yml" << 'PROMEOF'
  global:
    scrape_interval: 5s
    evaluation_interval: 5s
  rule_files:
    - alerts.yml
  scrape_configs:
  - job_name: 'payment-gateway'
    metrics_path: /metrics
    static_configs:
    - targets: ['localhost:9219']
  PROMEOF

  cat > "$WORKDIR/alerts.yml" << 'ALERTEOF'
  groups:
  - name: payment-gateway-alerts
    rules:
    - alert: LowNetworkTraffic
      expr: sum(rate(http_requests_total{service="payment-gateway"}[1m])) < 10
      for: 30s
      labels:
        severity: critical
        service: payment-gateway
        namespace: app-219
      annotations:
        summary: "HTTP request rate dropped below 10 req/s"
  ALERTEOF

  # Start Prometheus
  /tmp/prometheus-bin/prometheus \
    --config.file="$WORKDIR/prometheus.yml" \
    --storage.tsdb.path="$WORKDIR/data" \
    --web.listen-address=":10219" \
    --log.level=warn > "$WORKDIR/prometheus.log" 2>&1 &
  PROM_PID=$!
  echo "$PROM_PID" > "$WORKDIR/prometheus.pid"
  sleep 3

  PROM_READY=false
  for i in {1..30}; do
    if curl -sf http://localhost:10219/-/ready >/dev/null 2>&1; then
      echo "✅ Prometheus ready on :10219 (PID $PROM_PID)"
      PROM_READY=true
      break
    fi
    sleep 1
  done
  if [ "$PROM_READY" = false ]; then
    echo "❌ Prometheus failed to start"
    exit 1
  fi

  # Wait for traffic drop pattern (normal ~60s then drop + ~60s after)
  echo "⏳ Waiting 130s for traffic drop pattern to develop..."
  sleep 130

  echo "✅ Setup complete - traffic drop pattern should be visible"

after_test: |
  WORKDIR="/tmp/holmesgpt-eval-219"
  kill $(cat "$WORKDIR/exporter.pid" 2>/dev/null) 2>/dev/null || true
  kill $(cat "$WORKDIR/prometheus.pid" 2>/dev/null) 2>/dev/null || true
  rm -rf "$WORKDIR"
