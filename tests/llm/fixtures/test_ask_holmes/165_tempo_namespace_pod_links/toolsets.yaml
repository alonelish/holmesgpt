toolsets:
  kubernetes/core:
    enabled: true
  grafana/tempo:
    enabled: true
    config:
      url: http://localhost:3115
      healthcheck: "ready"
      labels:
        service: service.name
        pod: k8s.pod.name
        namespace: k8s.namespace.name
        deployment: k8s.deployment.name
        node: k8s.node.name
  kubernetes/logs:
    enabled: false
  runbook:
    enabled: false

