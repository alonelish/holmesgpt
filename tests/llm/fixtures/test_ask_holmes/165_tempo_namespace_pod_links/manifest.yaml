# Payment service deployment with OpenTelemetry tracing to Tempo
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: app-165
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        component: backend
      annotations:
        admission.datadoghq.com/enabled: "false"
    spec:
      containers:
      # Main application container with OpenTelemetry tracing
      - name: payment-service
        image: me-west1-docker.pkg.dev/robusta-development/development/python-flask-otel:3.0
        imagePullPolicy: IfNotPresent
        command: ["python", "/app/app-traces.py"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: PYTHONUNBUFFERED
          value: "1"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: app-script
          mountPath: /app
        securityContext:
          capabilities:
            add:
            - SYS_PTRACE
        resources:
          requests:
            memory: "128Mi"
            cpu: "10m"
          limits:
            memory: "256Mi"
      volumes:
      - name: app-script
        secret:
          secretName: payment-service-165-script
          defaultMode: 0755

