apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-stress
  namespace: app-215
  labels:
    app: cpu-stress
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cpu-stress
  template:
    metadata:
      labels:
        app: cpu-stress
    spec:
      containers:
      - name: stress
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
        - |
          # Generate HTTP traffic to notification-service to drive CPU up
          while true; do
            wget -q -O /dev/null http://notification-service.app-215.svc.cluster.local/send --post-data='{}' --header='Content-Type: application/json' 2>/dev/null || true
          done
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
