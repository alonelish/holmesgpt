# Toolset configuration for Confluence page fetch test (service account)
toolsets:
  confluence:
    enabled: true
    config:
      api_url: "{{ env.CONFLUENCE_BASE_URL }}"
      user: "{{ env.CONFLUENCE_SA_USER }}"
      api_key: "{{ env.CONFLUENCE_SA_API_KEY }}"
  # Disable K8s-dependent toolsets (no K8s in this test)
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
