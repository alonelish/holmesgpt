apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: app-221
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
    - job_name: 'node-metrics'
      metrics_path: /metrics
      static_configs:
      - targets: ['node-metrics.app-221.svc.cluster.local:9100']
  alerts.yml: |
    groups:
    - name: node-alerts
      rules:
      - alert: HighFileDescriptorUsage
        expr: node_filefd_usage_percent > 75
        for: 1m
        labels:
          severity: warning
          node: worker-node-3
        annotations:
          summary: "Node file descriptor usage above 75%"
          description: "worker-node-3 is using {{ $value }}% of available file descriptors ({{ $labels.node_filefd_allocated }}/{{ $labels.node_filefd_maximum }})"
