user_prompt:
  - "An alert fired for HighFileDescriptorUsage on worker-node-3. The node is running low on file descriptors. Investigate using Prometheus to find which pod in namespace app-221 is causing the issue."
  - "We got a HighFileDescriptorUsage alert for worker-node-3. Node FD usage is climbing toward the limit. Use Prometheus metrics to identify which pod in app-221 is leaking file descriptors."

expected_output:
  - "Must identify log-collector (pod log-collector-6b8f4d9a7-mv2rq) as the pod that is leaking file descriptors"
  - "Must describe the log-collector's FD usage as monotonically increasing or steadily growing, in contrast to other pods which are stable"
  - "Must mention the node's file descriptor allocation is climbing toward the limit (65536) or is at a high percentage"
  - "Should note that other pods (event-router, metrics-aggregator, config-watcher, cache-proxy) have stable FD usage"

tags:
  - hard
  - chain-of-causation
  - prometheus
  - metrics

setup_timeout: 300

before_test: |
  set -e
  WORKDIR="/tmp/holmesgpt-eval-221"
  rm -rf "$WORKDIR"
  mkdir -p "$WORKDIR"

  # Start the metrics exporter (redirect to file so subprocess.run pipe closes)
  python3 ./metrics_exporter.py > "$WORKDIR/exporter.log" 2>&1 &
  EXPORTER_PID=$!
  echo "$EXPORTER_PID" > "$WORKDIR/exporter.pid"
  sleep 2

  if ! kill -0 "$EXPORTER_PID" 2>/dev/null; then
    echo "❌ Metrics exporter failed to start"
    exit 1
  fi
  echo "✅ Metrics exporter running on :9221 (PID $EXPORTER_PID)"

  # Create Prometheus config
  cat > "$WORKDIR/prometheus.yml" << 'PROMEOF'
  global:
    scrape_interval: 5s
    evaluation_interval: 5s
  rule_files:
    - alerts.yml
  scrape_configs:
  - job_name: 'node-metrics'
    metrics_path: /metrics
    static_configs:
    - targets: ['localhost:9221']
  PROMEOF

  cat > "$WORKDIR/alerts.yml" << 'ALERTEOF'
  groups:
  - name: node-alerts
    rules:
    - alert: HighFileDescriptorUsage
      expr: node_filefd_usage_percent > 75
      for: 1m
      labels:
        severity: warning
        node: worker-node-3
      annotations:
        summary: "Node file descriptor usage above 75%"
  ALERTEOF

  # Start Prometheus
  /tmp/prometheus-bin/prometheus \
    --config.file="$WORKDIR/prometheus.yml" \
    --storage.tsdb.path="$WORKDIR/data" \
    --web.listen-address=":10221" \
    --log.level=warn > "$WORKDIR/prometheus.log" 2>&1 &
  PROM_PID=$!
  echo "$PROM_PID" > "$WORKDIR/prometheus.pid"
  sleep 3

  PROM_READY=false
  for i in {1..30}; do
    if curl -sf http://localhost:10221/-/ready >/dev/null 2>&1; then
      echo "✅ Prometheus ready on :10221 (PID $PROM_PID)"
      PROM_READY=true
      break
    fi
    sleep 1
  done
  if [ "$PROM_READY" = false ]; then
    echo "❌ Prometheus failed to start"
    exit 1
  fi

  # Wait for FD leak pattern to develop
  echo "⏳ Waiting 150s for file descriptor leak pattern to develop..."
  sleep 150

  # Verify metrics are visible
  RESULT=$(curl -sf 'http://localhost:10221/api/v1/query?query=process_open_fds%7Bnamespace%3D%22app-221%22%7D' 2>/dev/null || echo "")
  if echo "$RESULT" | grep -q "log-collector"; then
    echo "✅ FD metrics visible in Prometheus"
  else
    echo "⚠️ FD metrics may not be fully visible yet"
  fi

after_test: |
  WORKDIR="/tmp/holmesgpt-eval-221"
  kill $(cat "$WORKDIR/exporter.pid" 2>/dev/null) 2>/dev/null || true
  kill $(cat "$WORKDIR/prometheus.pid" 2>/dev/null) 2>/dev/null || true
  rm -rf "$WORKDIR"
