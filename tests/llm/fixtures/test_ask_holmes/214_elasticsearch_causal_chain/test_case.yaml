# Test: Elasticsearch Causal Chain Reconstruction (4-Stage Cascade)
#
# This test creates 4 service indexes representing a dependency chain where
# a failure in one service cascades through the system with specific time delays:
# inventory (disk I/O) -> orders (timeouts) -> auth (pool exhaustion) -> gateway (503s)
#
# The LLM must:
# 1. Query all 4 service indexes
# 2. Identify the spike start time in each service
# 3. Extract specific error codes that only appear during spikes
# 4. Order the failures temporally to reconstruct the causal chain
# 5. Compute inter-stage time delays (3min, 5min, 3min)
#
# Anti-hallucination: Error codes (IO-WAIT-K9X2, TIMEOUT-M3P7, POOL-EXHAUST-Q5R1,
# UPSTREAM-503-J8N4) and exact timing can only be found by querying.
#
# Requirements:
# - ELASTICSEARCH_URL: URL to Elasticsearch cluster
# - ELASTICSEARCH_API_KEY: API key for authentication

user_prompt: "We experienced a cascading failure across our microservices. Examine the metrics in all app-214-cascade-* indexes. For each service, identify when the failure started (look for error codes or latency spikes). Reconstruct the causal chain: which service failed first? In what order did failures propagate? What are the specific error codes at each stage? What are the time gaps between each stage of the cascade?"

expected_output:
  - "Must identify that the cascade started in the inventory service at approximately 10:00 UTC with error code IO-WAIT-K9X2"
  - "Must identify that orders service failed next at approximately 10:03 UTC with error code TIMEOUT-M3P7 (approximately 3 minutes after inventory)"
  - "Must identify that auth service failed at approximately 10:08 UTC with error code POOL-EXHAUST-Q5R1 (approximately 5 minutes after orders)"
  - "Must identify that gateway service failed last at approximately 10:11 UTC with error code UPSTREAM-503-J8N4 (approximately 3 minutes after auth)"
  - "Must reconstruct the full chain: inventory -> orders -> auth -> gateway"

tags:
  - elasticsearch
  - hard
  - benchmark
  - fast

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  echo "Creating cascade service indexes..."

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-214-cascade-*" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  for service in inventory orders auth gateway; do
    CREATE_RESPONSE=$(curl -sf -X PUT "${ELASTICSEARCH_URL}/app-214-cascade-${service}" \
      -H "Content-Type: application/json" \
      -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
      -d '{
        "settings": {
          "number_of_shards": 1,
          "number_of_replicas": 0
        },
        "mappings": {
          "properties": {
            "@timestamp": {"type": "date"},
            "service": {"type": "keyword"},
            "latency_ms": {"type": "float"},
            "error_rate": {"type": "float"},
            "error_code": {"type": "keyword"},
            "status": {"type": "keyword"},
            "message": {"type": "text"},
            "request_count": {"type": "integer"}
          }
        }
      }')

    if ! echo "$CREATE_RESPONSE" | grep -q '"acknowledged":true'; then
      echo "Failed to create index for ${service}: $CREATE_RESPONSE"
      exit 1
    fi
  done

  echo "Generating 24 hours of minutely metrics with cascade failure..."

  cat > /tmp/es_gen_214.py << 'PYSCRIPT'
  import json, random

  random.seed(99)

  # Cascade timeline (in minutes from midnight):
  # inventory: spike at minute 600 (10:00 UTC)
  # orders: spike at minute 603 (10:03 UTC) - 3 min lag
  # auth: spike at minute 608 (10:08 UTC) - 5 min lag from orders
  # gateway: spike at minute 611 (10:11 UTC) - 3 min lag from auth
  # All spikes last ~20 minutes

  services = {
      "inventory": {"spike_start": 600, "spike_end": 619, "error_code": "IO-WAIT-K9X2",
                    "normal_latency": 30, "spike_latency": 800, "normal_error": 0.01, "spike_error": 0.45,
                    "spike_msg": "Disk I/O wait exceeded threshold, read latency critically high"},
      "orders": {"spike_start": 603, "spike_end": 622, "error_code": "TIMEOUT-M3P7",
                 "normal_latency": 80, "spike_latency": 5000, "normal_error": 0.02, "spike_error": 0.60,
                 "spike_msg": "Request to inventory service timed out after 5000ms"},
      "auth": {"spike_start": 608, "spike_end": 627, "error_code": "POOL-EXHAUST-Q5R1",
               "normal_latency": 25, "spike_latency": 3000, "normal_error": 0.005, "spike_error": 0.70,
               "spike_msg": "Connection pool exhausted, all 200 connections in use, retry queue overflow"},
      "gateway": {"spike_start": 611, "spike_end": 630, "error_code": "UPSTREAM-503-J8N4",
                  "normal_latency": 120, "spike_latency": 10000, "normal_error": 0.015, "spike_error": 0.80,
                  "spike_msg": "Upstream auth service unavailable, returning 503 to clients"}
  }

  all_docs = []
  for svc_name, cfg in services.items():
      for minute in range(1440):  # 24 hours
          hour = minute // 60
          min_in_hour = minute % 60
          ts = f"2024-04-22T{hour:02d}:{min_in_hour:02d}:00Z"

          in_spike = cfg["spike_start"] <= minute <= cfg["spike_end"]

          if in_spike:
              latency = cfg["spike_latency"] + random.gauss(0, cfg["spike_latency"] * 0.1)
              error_rate = cfg["spike_error"] + random.gauss(0, 0.05)
              error_code = cfg["error_code"]
              status = "degraded"
              message = cfg["spike_msg"]
          else:
              latency = cfg["normal_latency"] + random.gauss(0, cfg["normal_latency"] * 0.15)
              error_rate = cfg["normal_error"] + random.gauss(0, 0.003)
              error_code = None
              status = "healthy"
              message = "Normal operation"

          doc = {
              "@timestamp": ts,
              "service": svc_name,
              "latency_ms": round(max(latency, 1), 1),
              "error_rate": round(max(error_rate, 0), 4),
              "status": status,
              "message": message,
              "request_count": random.randint(50, 150)
          }
          if error_code:
              doc["error_code"] = error_code

          all_docs.append((f"app-214-cascade-{svc_name}", doc))

  with open("/tmp/es_cascade_214.ndjson", "w") as f:
      for idx, doc in all_docs:
          f.write(json.dumps({"index": {"_index": idx}}) + "\n")
          f.write(json.dumps(doc) + "\n")

  print(f"Generated {len(all_docs)} data points across 4 services")
  for svc_name, cfg in services.items():
      spike_h = cfg["spike_start"] // 60
      spike_m = cfg["spike_start"] % 60
      print(f"  {svc_name}: spike at {spike_h:02d}:{spike_m:02d} UTC, error_code={cfg['error_code']}")
  PYSCRIPT
  python3 /tmp/es_gen_214.py
  rm -f /tmp/es_gen_214.py

  DOC_COUNT=$(grep -c '"index"' /tmp/es_cascade_214.ndjson)
  echo "Bulk file has $DOC_COUNT documents"

  # Bulk insert in chunks
  split -l 2000 /tmp/es_cascade_214.ndjson /tmp/es_cascade_214_chunk_

  for chunk in /tmp/es_cascade_214_chunk_*; do
    RESPONSE=$(curl -sf -X POST "${ELASTICSEARCH_URL}/_bulk" \
      -H "Content-Type: application/x-ndjson" \
      -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
      --data-binary @"$chunk")

    if echo "$RESPONSE" | grep -q '"errors":true'; then
      echo "Errors in bulk insert chunk"
    fi
  done

  rm -f /tmp/es_cascade_214.ndjson /tmp/es_cascade_214_chunk_*

  curl -sf -X POST "${ELASTICSEARCH_URL}/app-214-cascade-*/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  sleep 2

  # Verify
  for service in inventory orders auth gateway; do
    TOTAL=$(curl -sf -X POST "${ELASTICSEARCH_URL}/app-214-cascade-${service}/_count" \
      -H "Content-Type: application/json" \
      -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
      -d '{"query": {"match_all": {}}}' | python3 -c "import sys,json; print(json.load(sys.stdin)['count'])")

    SPIKE=$(curl -sf -X POST "${ELASTICSEARCH_URL}/app-214-cascade-${service}/_count" \
      -H "Content-Type: application/json" \
      -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
      -d '{"query": {"exists": {"field": "error_code"}}}' | python3 -c "import sys,json; print(json.load(sys.stdin)['count'])")

    echo "${service}: $TOTAL total, $SPIKE spike points"
  done

  echo "Setup complete!"

after_test: |
  echo "Cleaning up cascade indexes..."
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-214-cascade-*" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  rm -f /tmp/es_cascade_214*.ndjson /tmp/es_cascade_214_chunk_*
  echo "Cleanup complete"
