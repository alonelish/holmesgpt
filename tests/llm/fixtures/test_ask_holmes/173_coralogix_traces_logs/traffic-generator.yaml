# Secret is created in test_case.yaml setup from user_signup.py
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-signup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-signup
  template:
    metadata:
      labels:
        app: user-signup
    spec:
      containers:
      - name: user-signup
        image: python:3.9-slim
        command: 
        - sh
        - -c
        - |
          pip install requests -q
          python /app/user_signup.py
        volumeMounts:
        - name: app
          mountPath: /app
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
      volumes:
      - name: app
        secret:
          secretName: user-signup-app
