apiVersion: v1
kind: Pod
metadata:
  name: file-processor
  namespace: app-212
  labels:
    app: file-processor
spec:
  containers:
    - name: worker
      image: alpine:3.19
      command:
        - /bin/sh
        - -c
        - |
          mkdir -p /var/data

          # Create 90 small files (1KB each)
          for i in $(seq 1 90); do
            dd if=/dev/urandom of=/var/data/small_$i.dat bs=1K count=1 2>/dev/null
          done

          # Create 10 large files (15MB each)
          for i in $(seq 91 100); do
            dd if=/dev/urandom of=/var/data/large_$i.dat bs=1M count=15 2>/dev/null
          done

          echo "Files created successfully"
          ls -la /var/data | head -20

          # Keep container running
          sleep 3600
      resources:
        limits:
          memory: "256Mi"
          cpu: "200m"
        requests:
          memory: "128Mi"
          cpu: "100m"
