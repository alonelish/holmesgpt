apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: app-220
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    scrape_configs:
    - job_name: 'container-metrics'
      metrics_path: /metrics
      static_configs:
      - targets: ['container-metrics.app-220.svc.cluster.local:9100']
