user_prompt:
  - "The model-cache pod in namespace app-220 was OOMKilled. Investigate why and check the memory usage pattern in Prometheus to understand the root cause."
  - "A pod called model-cache in app-220 namespace got OOMKilled. Use Prometheus to look at memory trends and determine what caused it."

expected_output:
  - "Must identify that the model-cache pod was OOMKilled (memory exceeded its limit of 256Mi)"
  - "Must describe the memory pattern as monotonically increasing, steadily growing, or linear growth over time - indicating a memory leak rather than a sudden spike"
  - "Must suggest the root cause is a memory leak (e.g., unbounded cache, missing eviction, growing data structure)"
  - "Should contrast the leaking pod's memory pattern with the stable memory of other pods in the namespace (auth-service, rate-limiter) to highlight the anomaly"

tags:
  - hard
  - chain-of-causation
  - prometheus
  - metrics

setup_timeout: 300

before_test: |
  set -e
  WORKDIR="/tmp/holmesgpt-eval-220"
  rm -rf "$WORKDIR"
  mkdir -p "$WORKDIR"

  # Start the metrics exporter (redirect to file so subprocess.run pipe closes)
  python3 ./metrics_exporter.py > "$WORKDIR/exporter.log" 2>&1 &
  EXPORTER_PID=$!
  echo "$EXPORTER_PID" > "$WORKDIR/exporter.pid"
  sleep 2

  if ! kill -0 "$EXPORTER_PID" 2>/dev/null; then
    echo "❌ Metrics exporter failed to start"
    exit 1
  fi
  echo "✅ Metrics exporter running on :9220 (PID $EXPORTER_PID)"

  # Create Prometheus config
  cat > "$WORKDIR/prometheus.yml" << 'PROMEOF'
  global:
    scrape_interval: 5s
    evaluation_interval: 5s
  scrape_configs:
  - job_name: 'container-metrics'
    metrics_path: /metrics
    static_configs:
    - targets: ['localhost:9220']
  PROMEOF

  # Start Prometheus
  /tmp/prometheus-bin/prometheus \
    --config.file="$WORKDIR/prometheus.yml" \
    --storage.tsdb.path="$WORKDIR/data" \
    --web.listen-address=":10220" \
    --log.level=warn > "$WORKDIR/prometheus.log" 2>&1 &
  PROM_PID=$!
  echo "$PROM_PID" > "$WORKDIR/prometheus.pid"
  sleep 3

  PROM_READY=false
  for i in {1..30}; do
    if curl -sf http://localhost:10220/-/ready >/dev/null 2>&1; then
      echo "✅ Prometheus ready on :10220 (PID $PROM_PID)"
      PROM_READY=true
      break
    fi
    sleep 1
  done
  if [ "$PROM_READY" = false ]; then
    echo "❌ Prometheus failed to start"
    exit 1
  fi

  # Wait for memory growth pattern to develop
  echo "⏳ Waiting 120s for memory growth pattern to develop..."
  sleep 120

  # Verify memory metrics exist
  RESULT=$(curl -sf 'http://localhost:10220/api/v1/query?query=container_memory_working_set_bytes%7Bnamespace%3D%22app-220%22%7D' 2>/dev/null || echo "")
  if echo "$RESULT" | grep -q "model-cache"; then
    echo "✅ Memory metrics for model-cache visible in Prometheus"
  else
    echo "⚠️ Memory metrics may not be fully visible yet"
  fi

after_test: |
  WORKDIR="/tmp/holmesgpt-eval-220"
  kill $(cat "$WORKDIR/exporter.pid" 2>/dev/null) 2>/dev/null || true
  kill $(cat "$WORKDIR/prometheus.pid" 2>/dev/null) 2>/dev/null || true
  rm -rf "$WORKDIR"
