# This test verifies that the Grafana dashboard merge update tool works correctly
# and that user approval is requested before making changes.

user_prompt: "Update the title of the 'Sales Metrics' dashboard in Grafana to 'Revenue Metrics Dashboard'"

expected_output:
  - Holmes should request user approval before updating the dashboard
  - The tool grafana_merge_dashboard_update should be used
  - The dashboard UID 'sales-metrics-dash' should be targeted
  - The new title 'Revenue Metrics Dashboard' should be set

before_test: |
  set -e  # Exit immediately if any command fails
  kubectl create namespace app-183 --save-config --dry-run=client -o yaml | kubectl apply -f - || true
  kubectl apply -f ../../shared/grafana.yaml -n app-183

  # Wait for Grafana pod to be ready
  echo "Waiting for Grafana pod to be ready..."
  POD_READY=false
  for i in {1..60}; do
    if kubectl wait --for=condition=ready pod -l app=grafana -n app-183 --timeout=5s 2>/dev/null; then
      echo "Grafana pod is ready!"
      POD_READY=true
      break
    else
      echo "Attempt $i/60: Grafana pod not ready yet, waiting 1s..."
      sleep 1
    fi
  done

  if [ "$POD_READY" = false ]; then
    echo "Grafana pod failed to become ready after 60 seconds"
    kubectl get pods -n app-183
    kubectl describe pod -l app=grafana -n app-183
    exit 1
  fi

  # Verify Grafana API is working using kubectl exec
  echo "Verifying Grafana API..."
  API_READY=false
  for i in {1..30}; do
    if kubectl exec -n app-183 deployment/grafana -- wget -q -O- http://localhost:3000/api/health 2>/dev/null | grep -q "ok"; then
      echo "Grafana API is working!"
      API_READY=true
      break
    else
      echo "Attempt $i/30: Grafana API not ready yet, waiting 1s..."
      sleep 1
    fi
  done

  if [ "$API_READY" = false ]; then
    echo "Grafana API failed verification"
    echo "Checking pod logs..."
    kubectl logs -l app=grafana -n app-183 --tail=20
    exit 1
  fi

  # Create the test dashboard
  echo "Creating test dashboard..."
  DASHBOARD_JSON='{
    "dashboard": {
      "uid": "sales-metrics-dash",
      "title": "Sales Metrics",
      "tags": ["sales", "metrics"],
      "panels": [
        {
          "id": 1,
          "title": "Total Revenue",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4}
        },
        {
          "id": 2,
          "title": "Orders Per Hour",
          "type": "timeseries",
          "gridPos": {"x": 6, "y": 0, "w": 12, "h": 8}
        }
      ],
      "schemaVersion": 39,
      "timezone": "browser"
    },
    "overwrite": true
  }'

  DASHBOARD_CREATED=false
  for i in {1..10}; do
    echo "Attempt $i/10: Creating test dashboard..."
    RESULT=$(kubectl exec -n app-183 deployment/grafana -- curl -s -w "\nHTTP_CODE:%{http_code}" \
      -X POST -H "Content-Type: application/json" \
      -d "$DASHBOARD_JSON" \
      http://localhost:3000/api/dashboards/db 2>&1)

    HTTP_CODE=$(echo "$RESULT" | grep "HTTP_CODE:" | cut -d: -f2)
    RESPONSE=$(echo "$RESULT" | grep -v "HTTP_CODE:")

    if [[ "$HTTP_CODE" == "200" ]] && echo "$RESPONSE" | grep -q '"id"'; then
      echo "Test dashboard created successfully!"
      DASHBOARD_CREATED=true
      break
    else
      echo "Dashboard creation failed. HTTP: $HTTP_CODE, Response: $RESPONSE"
      sleep 1
    fi
  done

  if [ "$DASHBOARD_CREATED" = false ]; then
    echo "Failed to create dashboard after 10 attempts"
    exit 1
  fi

  # Verify dashboard is searchable
  echo "Verifying dashboard is searchable..."
  if kubectl exec -n app-183 deployment/grafana -- wget -q -O- "http://localhost:3000/api/search?query=Sales%20Metrics" 2>/dev/null | grep -q "Sales Metrics"; then
    echo "Dashboard is searchable!"
  else
    echo "Dashboard verification failed"
    exit 1
  fi

  echo "Test setup completed successfully!"

after_test: |
  kubectl delete namespace app-183 || true

port_forwards:
  - namespace: app-183
    service: grafana
    local_port: 10183
    remote_port: 3000

tags:
  - hard
  - grafana-dashboard
  - kubernetes
