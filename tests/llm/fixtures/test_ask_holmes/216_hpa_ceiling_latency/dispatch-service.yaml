# Dispatch service using gunicorn (production WSGI server) — no Flask dev server red herring
apiVersion: v1
kind: Secret
metadata:
  name: dispatch-app
  namespace: app-216
type: Opaque
stringData:
  app.py: |
    from flask import Flask, Response, jsonify
    from prometheus_client import Counter, Histogram, generate_latest, CONTENT_TYPE_LATEST
    import time
    import random
    import os

    app = Flask(__name__)

    NAMESPACE = os.environ.get('NAMESPACE', 'app-216')
    POD_NAME = os.environ.get('POD_NAME', os.environ.get('HOSTNAME', 'unknown'))

    request_count = Counter(
        'dispatch_requests_total',
        'Total dispatch requests',
        ['namespace', 'pod', 'status']
    )

    request_duration = Histogram(
        'dispatch_request_duration_seconds',
        'Request duration in seconds',
        ['namespace', 'pod'],
        buckets=[0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0, 30.0]
    )

    @app.route('/health')
    def health():
        return 'ok'

    @app.route('/dispatch', methods=['POST'])
    def dispatch():
        start = time.time()
        # CPU-intensive work: hash computation simulating route optimization
        data = str(random.random())
        for _ in range(300):
            import hashlib
            data = hashlib.sha256(data.encode()).hexdigest()
        time.sleep(random.uniform(0.05, 0.1))
        duration = time.time() - start

        request_count.labels(namespace=NAMESPACE, pod=POD_NAME, status='dispatched').inc()
        request_duration.labels(namespace=NAMESPACE, pod=POD_NAME).observe(duration)

        return jsonify({"status": "dispatched", "duration": round(duration, 3)})

    @app.route('/metrics')
    def metrics():
        return Response(generate_latest(), mimetype=CONTENT_TYPE_LATEST)

  gunicorn_config.py: |
    bind = "0.0.0.0:8080"
    workers = 2
    threads = 2
    timeout = 30
    accesslog = "-"
    errorlog = "-"
    loglevel = "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-service
  namespace: app-216
  labels:
    app: dispatch-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: dispatch-service
        image: me-west1-docker.pkg.dev/robusta-development/development/python-flask-otel:2.2
        imagePullPolicy: IfNotPresent
        command: ["gunicorn", "-c", "/app/gunicorn_config.py", "app:app"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: app-code
          mountPath: /app
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 10
      volumes:
      - name: app-code
        secret:
          secretName: dispatch-app
---
apiVersion: v1
kind: Service
metadata:
  name: dispatch-service
  namespace: app-216
  labels:
    app: dispatch-service
spec:
  selector:
    app: dispatch-service
  ports:
  - port: 80
    targetPort: 8080
    name: http
