user_prompt:
  - "The ad-serving service in namespace app-174 is showing slow requests."

expected_output:
  - The answer must identify a long-duration trace involving a database query
  - The answer must mention database slowness/connection issues causing the latency
  - The answer should reference Coralogix traces

tags:
  - kubernetes
  - traces

setup_timeout: 900

before_test: |
  echo "🚀 Setting up test 174 - Creating namespace app-174"
  kubectl create namespace app-174 || true
  echo "✅ Namespace app-174 created successfully!"

  echo "🔐 Creating ad-service secret from shared coralogix_app.py"
  kubectl create secret generic ad-service-app \
    --from-file=app.py=../../shared/coralogix/coralogix_app.py \
    -n app-174 --dry-run=client -o yaml | kubectl apply -f -

  echo "🔐 Creating ad traffic-generator secret from shared traffic_generator.py"
  kubectl create secret generic ad-generator-app \
    --from-file=traffic_generator.py=../../shared/coralogix/traffic_generator.py \
    -n app-174 --dry-run=client -o yaml | kubectl apply -f -

  echo "📦 Deploying ad service"
  kubectl apply -f ad-service.yaml -n app-174

  echo "⏳ Waiting for ad-service pod to exist"
  for i in {1..60}; do
    if kubectl get pod -l app=ad-service -n app-174 2>/dev/null | grep -q ad-service; then
      echo "✅ ad-service pod exists"
      break
    fi
    echo "Waiting for ad-service pod to be created... ($i/60)"
    sleep 2
  done

  echo "⏳ Waiting for ad-service pod to be ready (timeout 780s)"
  AD_POD_READY=false
  for i in {1..156}; do
    if kubectl wait --for=condition=ready pod -l app=ad-service -n app-174 --timeout=5s 2>/dev/null; then
      echo "✅ ad-service pod is ready!"
      AD_POD_READY=true
      break
    else
      echo "⏳ Attempt $i/156: ad-service pod not ready yet, waiting 5s..."
      sleep 5
    fi
  done

  if [ "$AD_POD_READY" = false ]; then
    echo "❌ ad-service pod failed to become ready after 780 seconds"
    kubectl get pods -n app-174 -l app=ad-service
    exit 1
  fi

  echo "🔍 Checking ad-service deployment status"
  kubectl get pods -n app-174 -l app=ad-service

  echo "🚦 Deploying ad traffic generator"
  kubectl apply -f ad-traffic-generator.yaml -n app-174

  echo "⏳ Waiting for ad-generator pod to exist"
  for i in {1..60}; do
    if kubectl get pod -l app=ad-generator -n app-174 2>/dev/null | grep -q ad-generator; then
      echo "✅ ad-generator pod exists"
      break
    fi
    echo "Waiting for ad-generator pod to be created... ($i/60)"
    sleep 2
  done

  echo "⏳ Waiting for ad-generator pod to be ready (timeout 780s)"
  TRAFFIC_POD_READY=false
  for i in {1..156}; do
    if kubectl wait --for=condition=ready pod -l app=ad-generator -n app-174 --timeout=5s 2>/dev/null; then
      echo "✅ ad-generator pod is ready!"
      TRAFFIC_POD_READY=true
      break
    else
      echo "⏳ Attempt $i/156: ad-generator pod not ready yet, waiting 5s..."
      sleep 5
    fi
  done

  if [ "$TRAFFIC_POD_READY" = false ]; then
    echo "❌ ad-generator pod failed to become ready after 780 seconds"
    kubectl get pods -n app-174 -l app=ad-generator
    exit 1
  fi

  echo "🔍 Checking all pods status"
  kubectl get pods -n app-174

  echo "⏰ Waiting for ad traffic to produce logs and traces..."
  TRAFFIC_READY=false
  for i in {1..90}; do
    AD_LOGS=$(kubectl logs -n app-174 -l app=ad-service --tail=100 2>/dev/null | grep -c "Processing ad request" || echo "0")
    ERROR_LOGS=$(kubectl logs -n app-174 -l app=ad-service --tail=100 2>/dev/null | grep -c "ERROR\\|WARN" || echo "0")

    if [ "$AD_LOGS" -gt "10" ] && [ "$ERROR_LOGS" -gt "0" ]; then
      echo "✅ Found required logs after $i seconds:"
      echo "   - Ad processing logs: $AD_LOGS"
      echo "   - Error/Warning logs: $ERROR_LOGS"
      TRAFFIC_READY=true
      sleep 10
      break
    fi

    echo "⏳ Attempt $i/90: AD_LOGS=$AD_LOGS, ERRORS=$ERROR_LOGS"
    sleep 1
  done

  if [ "$TRAFFIC_READY" = false ]; then
    echo "❌ Failed to generate required traffic patterns"
    exit 1
  fi

  # Delete ad-generator so the ai won't cheat
  kubectl delete -f ad-traffic-generator.yaml -n app-174

  echo "✅ Test setup complete!"

after_test: |
  kubectl delete namespace app-174 || true

