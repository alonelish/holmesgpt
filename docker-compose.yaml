services:
  holmes:
    image: us-central1-docker.pkg.dev/genuine-flight-317411/devel/holmes
    network_mode: host
    environment:
      # Uncomment the API key for your LLM provider:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      # - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      # - AZURE_API_KEY=${AZURE_API_KEY:-}
      # - AZURE_API_BASE=${AZURE_API_BASE:-}
      # - AZURE_API_VERSION=${AZURE_API_VERSION:-}
    volumes:
      - ~/.holmes:/root/.holmes
      - ~/.kube/config:/root/.kube/config:ro
      - ~/.aws:/root/.aws:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    # Override with your own question or subcommand, e.g.:
    #   docker compose run holmes ask "what pods are unhealthy and why?"
    #   docker compose run holmes investigate alertmanager
    entrypoint: ["python", "holmes_cli.py"]
    command: ["ask", "what pods are unhealthy and why?"]
