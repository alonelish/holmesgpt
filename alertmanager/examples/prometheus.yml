# Example Prometheus configuration for AI-Alertmanager
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - ai-alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

scrape_configs:
  # Self-scraping
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AI-Alertmanager metrics
  - job_name: 'ai-alertmanager'
    static_configs:
      - targets: ['ai-alertmanager:9093']
