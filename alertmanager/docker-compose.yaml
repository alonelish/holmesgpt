version: '3.8'

services:
  # HolmesGPT server (required for AI investigations)
  holmes:
    image: us-central1-docker.pkg.dev/genuine-flight-317411/devel/holmesgpt:latest
    container_name: holmes
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL=gpt-4.1
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    command: ["server"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # AI-Alertmanager
  ai-alertmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-alertmanager
    ports:
      - "9093:9093"
    environment:
      - AI_ALERTMANAGER_HOLMES_URL=http://holmes:8080
      - AI_ALERTMANAGER_ENABLE_AI_INVESTIGATION=true
      - AI_ALERTMANAGER_INVESTIGATE_ON_CREATE=true
      - AI_ALERTMANAGER_INVESTIGATION_CONCURRENCY=5
      - AI_ALERTMANAGER_LOG_LEVEL=INFO
    depends_on:
      holmes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9093/healthz', timeout=5.0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Prometheus (optional - for testing)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./examples/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - ai-alertmanager

volumes:
  prometheus_data: {}
