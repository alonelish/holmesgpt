---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# ConfigMap for AI-Alertmanager configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-alertmanager-config
  namespace: monitoring
data:
  config.env: |
    AI_ALERTMANAGER_HOST=0.0.0.0
    AI_ALERTMANAGER_PORT=9093
    AI_ALERTMANAGER_HOLMES_URL=http://holmes:8080
    AI_ALERTMANAGER_ENABLE_AI_INVESTIGATION=true
    AI_ALERTMANAGER_INVESTIGATE_ON_CREATE=true
    AI_ALERTMANAGER_INVESTIGATION_CONCURRENCY=5
    AI_ALERTMANAGER_LOG_LEVEL=INFO
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-alertmanager
  namespace: monitoring
  labels:
    app: ai-alertmanager
    component: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-alertmanager
      component: alertmanager
  template:
    metadata:
      labels:
        app: ai-alertmanager
        component: alertmanager
    spec:
      containers:
      - name: ai-alertmanager
        image: ai-alertmanager:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 9093
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ai-alertmanager-config
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: ai-alertmanager
  namespace: monitoring
  labels:
    app: ai-alertmanager
    component: alertmanager
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 9093
    targetPort: http
    protocol: TCP
  selector:
    app: ai-alertmanager
    component: alertmanager
---
# Service for Prometheus Operator compatibility
# This service uses the same name as the default Alertmanager service
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-operated
  namespace: monitoring
  labels:
    app: ai-alertmanager
    component: alertmanager
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  ports:
  - name: http
    port: 9093
    targetPort: http
    protocol: TCP
  - name: mesh-tcp
    port: 9094
    targetPort: 9094
    protocol: TCP
  - name: mesh-udp
    port: 9094
    targetPort: 9094
    protocol: UDP
  selector:
    app: ai-alertmanager
    component: alertmanager
